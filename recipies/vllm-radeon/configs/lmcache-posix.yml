# LMCache POSIX filesystem backend

chunk_size: 256
pre_caching_hash_algorithm: sha256_cbor
local_cpu: false
max_local_cpu_size: 5.0
remote_serde: naive
blocking_timeout_secs: 10
cache_policy: LRU
save_decode_cache: true
remote_storage_plugins:
  - fs
extra_config:
  remote_storage_plugin.fs.base_path: ""
  use_direct_io: true
