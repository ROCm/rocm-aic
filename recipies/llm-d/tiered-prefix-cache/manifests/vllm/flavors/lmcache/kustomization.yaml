apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../../../../../submodules/llm-d/guides/optimized-baseline/modelserver/amd/vllm

components:
  - ../../../../../../../submodules/llm-d/guides/recipes/modelserver/components/monitoring

# LMCache-specific configuration; can override through env variables in `llm-d-model-server` too.
configMapGenerator:
  - name: config-map
    literals:
      - |
        lmcache_config.yaml=chunk_size: 256
        save_decode_cache: True
        local_cpu: true
        max_local_cpu_size: 200.0
        local_disk: null
        remote_url: null

generatorOptions:
  disableNameSuffixHash: true

patches:
  # Update replicas
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Override image with LMCache-enabled build
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/vcave/vllm:rocm_721-vllm_0201-lmcache_20260513

  # Configure vLLM server with LMCache connector
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - "openai/gpt-oss-120b"
          - "--host=0.0.0.0"
          - "--port=8000"
          - "--kv-transfer-config={\"kv_connector\":\"LMCacheConnectorV1\",\"kv_role\":\"kv_both\"}"
          - "--max-num-seq=1024"
          - "--gpu-memory-utilization=0.90"
          - "--enable_prefix_caching"
          - "--disable-access-log-for-endpoints=/health,/metrics,/v1/models"
  # Add LMCache environment variables
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PYTHONHASHSEED
          value: "123"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PROMETHEUS_MULTIPROC_DIR
          value: "/tmp/lmcache_prometheus"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LMCACHE_CONFIG_FILE
          value: "/opt/configs/lmcache_config.yaml"

  # Mount config map for LMCache configuration
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: config-dir-volume
          configMap:
            name: config-map
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: config-dir-volume
          mountPath: /opt/configs
          readOnly: true

  # Mount prometheus metrics volume for LMCache
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: lmcache-prometheus-metrics
          emptyDir: {}
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: lmcache-prometheus-metrics
          mountPath: /tmp/lmcache_prometheus

  # Update resources for large CPU cache tier
  # NOTE: GPU count can be customized here to override upstream defaults
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            amd.com/gpu: 1
            cpu: "32"
            memory: 1800Gi
          requests:
            amd.com/gpu: 1
            cpu: "32"
            memory: 1800Gi

# Add tiered-prefix-cache specific labels
labels:
  - pairs:
      llm-d.ai/deployment: tiered-prefix-cache
      llm-d.ai/connector: lmcache
    includeSelectors: true
    includeTemplates: true
