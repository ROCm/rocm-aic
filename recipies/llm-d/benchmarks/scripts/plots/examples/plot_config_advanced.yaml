# Advanced plotting configuration example
#
# This example demonstrates more advanced features including:
# - Multi-panel plots (row_by, col_by)
# - Aggregation
# - Custom styling
# - Multiple plot types

extraction:
  input: results/sweeps/ttft-lmcache-cpu-only-isl-tp-sweep_2026-04-11/aggregated_results.json

  fields:
    tp_size: config.tensor_parallel_size
    isl: config._load_params.random_input_len
    gpu_util: config.vllm_args.gpu_memory_utilization

    # Extract from specific runs
    ttft_run1: benchmark.runs[0].metrics.ttft.mean_ms
    ttft_run2: benchmark.runs[1].metrics.ttft.median_ms

    # Metrics
    ttft_mean: benchmark.runs[*].metrics.ttft.mean_ms
    ttft_median: benchmark.runs[*].metrics.ttft.median_ms
    throughput: benchmark.runs[*].metrics.total_token_throughput

  run_strategy: average
  filter_failed: true

preparation:
  # More complex filtering
  filters:
    - "tp_size<=4"
    - "isl>=1000"
    - "isl<128000"

  # Binning to reduce noise
  binning:
    - "throughput%100"

  # Multiple transformations
  transformations:
    ttft_sec: ttft_mean / 1000
    isl_k: isl / 1000
    speedup: throughput / throughput.shift(1)
    tp_label: "'TP=' + tp_size.astype(str)"

  drop_nulls: true

plots:
  # Multi-panel plot: Different TP sizes in columns
  - name: ttft_comparison_matrix
    x_axis: isl
    y_axis: ttft_mean
    series_by:
      - gpu_util
    col_by:
      - tp_size
    title: "TTFT Performance Matrix"
    x_label: "Input Length (tokens)"
    y_label: "TTFT (ms)"
    x_scale: log
    fig_width: 8
    fig_height: 6
    show_grid: true

  # Separate figures for each TP size
  - name: throughput_detailed
    x_axis: isl_k
    y_axis: throughput
    fig_by:
      - tp_size
    title: "Throughput Analysis"
    x_label: "Input Length (K tokens)"
    y_label: "Throughput (tokens/s)"
    show_grid: true
    color_palette: Set2

output:
  directory: plots/advanced/
  backend: seaborn
  dpi: 300
