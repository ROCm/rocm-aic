name: "test-model-vllm-lmcache-sweep"
description: "Test health of various models against vllm+LMCache (TP=8)"
deployment: "tiered-prefix-cache-lmcache"
deployment_template: "tiered-prefix-cache-lmcache-hipfile-kustomization.yaml.tmpl"

# When using load-format dummy, override HF settings
env_vars:
  HF_HOME: "/root/hf_home_dummy"
  HUGGINGFACE_HUB_CACHE: "/root/hf_hub_dummy"
  VLLM_ROCM_USE_AITER: 1

parameters:
  image:
    type: categorical
    values:
      - "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  model:
    type: categorical
    values:
      - "Qwen/Qwen3-32B"
      - "deepseek-ai/DeepSeek-R1-0528"
      - "moonshotai/Kimi-K2.5"
      - "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      - "openai/gpt-oss-120b"
      # MXFP4 not yet supported
      #- "amd/Kimi-K2.5-MXFP4"
      #- "amd/DeepSeek-R1-0528-MXFP4"
      #- "amd/gpt-oss-120b-w-mxfp4-a-fp8"
  replicas:
    type: categorical
    values: [1]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed
    value: 100
  tensor_parallel_size:
    type: categorical
    values: [8]

  vllm_args:
    type: combinations
    args:
      load-format: "dummy"
      trust-remote-code: true # for kimi
      gpu_memory_utilization:
        values: [0.90]
      kv_connector:
        values:
          - type: "lmcache"
            role: "kv_both"

  lmcache_args:
    type: combinations
    args:
      chunk_size: 256
      save_decode_cache: True
      local_cpu: true
      max_local_cpu_size: 100.0
      local_disk: null
      remote_url: null

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  workload_file: "small_multi_turn.json"
  benchmark_args:
    num_clients: 5
    max_active_conversations: 5
    verbose: false
    excel_output: true
