name: "ttft-lmcache-nvme-only"
description: "Test a tiered-prefix-cache-lmcache single run with NVMe"
deployment: "tiered-prefix-cache-lmcache"
deployment_template: "tiered-prefix-cache-lmcache-hipfile-kustomization.yaml.tmpl"

parameters:
  image:
    type: categorical
    values:
      - "ghcr.io/vcave/vllm:rocm_721-vllm_0201-lmcache_20260514_384d79df"
  model:
    type: fixed
    value: "openai/gpt-oss-120b"
  replicas:
    type: categorical
    values: [1,2,4,8]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed
    value: 24
  tensor_parallel_size:
    type: categorical
    values: [1]

  vllm_args:
    type: combinations
    args:
      disable_uvicorn_access_log: true
      no_enable_prefix_caching: true # disable GPU prefix caching
      gpu_memory_utilization:
        values: [0.90]
      kv_connector:
        values:
          - type: "lmcache"
            role: "kv_both"

  lmcache_args:
    type: combinations
    args:
      chunk_size: 256
      save_decode_cache: True
      local_cpu: false
      # This path must agree with the pod's requested volumes
      gds_path: "/hipfile"
      cufile_buffer_size: 8192
      extra_config:
        use_hipfile: true
        use_cufile: false
        use_direct_io: true
      remote_url: null

load_generation:
  tool: "vllm-bench-serve"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  # Run benchmark twice: first run populates the cache, second run cache hits.
  clone_run: true
  benchmark_args:
    type: combinations
    args:
      dataset_name: random 
      # Note: When tweaking settings, make sure the cache size is large enough
      random_input_len:
        values: [1000, 2000, 4000, 10000, 20000, 40000, 80000, 128000]
      random_output_len: 1
      max_concurrency: 1
      num_prompts: 30
      ignore_eos: true
      # seed is auto-generated