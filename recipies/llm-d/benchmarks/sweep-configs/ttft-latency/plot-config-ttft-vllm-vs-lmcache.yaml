# Multi-source comparison: Native vLLM Offloading vs LMCache Offloading
# Compares TTFT performance between two different offloading strategies
#
# Each source has 2 runs:
# - run1: GPU prefill compute
# - run2: CPU KV cache hit reuse

sources:
  # Source 1: Native vLLM offloading
  - name: native_offload
    extraction:
      input: ./results/ttft-latency/vllm_offloading_cpu_aggregated_results.json
      fields:
        isl: config._load_params.random_input_len
        tp: config.tensor_parallel_size
        ttft: benchmark_run.metrics.ttft.mean_ms
        run_label: benchmark_run.run_label
      run_strategy: all  # Include both runs
    preparation:
      transformations:
        # Add strategy column to distinguish data sources
        strategy: "'Native vLLM'"
        # Transform run labels to descriptive names
        run_name: "run_label.str.replace('run1', 'GPU prefill').replace('run2', 'CPU KV cache hit')"
      sort_by: [run_label, tp]

  # Source 2: LMCache offloading
  - name: lmcache_offload
    extraction:
      input: ./results/ttft-latency/lmcache_cpu_aggregated_results.json
      fields:
        isl: config._load_params.random_input_len
        tp: config.tensor_parallel_size
        ttft: benchmark_run.metrics.ttft.mean_ms
        run_label: benchmark_run.run_label
      run_strategy: all  # Include both runs
    preparation:
      transformations:
        # Add strategy column to distinguish data sources
        strategy: "'LMCache'"
        # Transform run labels to descriptive names
        run_name: "run_label.str.replace('run1', 'GPU prefill').replace('run2', 'CPU KV cache hit')"
      sort_by: [run_label, tp]

# Optional: Global preparation after merging
merge_preparation:
  # Sort all data by strategy, run type, and tensor parallel size
  sort_by: [strategy, run_label, tp, isl]

export:
  output: ttft_vllm_vs_lmcache.json
  x: isl
  y: ttft

  # Group series by strategy, run_name, and TP
  # This creates separate series for:
  # - Native vLLM - GPU prefill (tp=1, 2, 4, ...)
  # - Native vLLM - CPU KV cache hit (tp=1, 2, 4, ...)
  # - LMCache - GPU prefill (tp=1, 2, 4, ...)
  # - LMCache - CPU KV cache hit (tp=1, 2, 4, ...)
  series_by: [strategy, run_name, tp]
  series_label_format: "{strategy} - {run_name} (TP={tp})"

  # Use different markers for run types (GPU prefill vs CPU cache hit)
  marker_by: run_name
  series_markers:
    "GPU prefill": "o"
    "CPU KV cache hit": "^"

  # Use different colors for strategies (Native vs LMCache)
  color_by: strategy
  series_colors:
    "Native vLLM": "#1f77b4"   # Blue
    "LMCache": "#ff7f0e"       # Orange

  # Use different line styles for run types
  linestyle_by: run_name
  series_linestyles:
    "GPU prefill": "-"         # Solid line
    "CPU KV cache hit": "--"   # Dashed line

  axes:
    x_scale: log
    y_scale: linear  # Using linear to better show differences

  style:
    legend_outside: true
    minor_grid: true
    markersize: 8
    linewidth: 2
    show_value_labels: false  # Disabled to avoid clutter with many series

  metadata:
    title: "TTFT Comparison: Native vLLM Offloading vs LMCache"
    x_label: "Input Sequence Length (tokens)"
    y_label: "Time to First Token (ms)"
    description: "Comparing GPU prefill compute and CPU KV cache hit reuse across different offloading strategies"

  figure:
    width: 14
    height: 8
    dpi: 300

plot:
  output: ttft_vllm_vs_lmcache.png
