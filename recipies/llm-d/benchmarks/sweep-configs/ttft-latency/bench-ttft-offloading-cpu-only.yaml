name: "ttft-offloading-cpu-only"
description: "Test a tiered-prefix-cache-offloading single run with CPU"
deployment: "tiered-prefix-cache-offloading"
deployment_template: "tiered-prefix-cache-offloading-hostpath-kustomization.yaml.tmpl"

parameters:
  image:
    type: categorical
    values:
      - "ghcr.io/vcave/vllm:rocm_721-vllm_0201-lmcache_20260514_384d79df"
  model:
    type: fixed
    value: "openai/gpt-oss-120b"
  replicas:
    type: categorical
    values: [1]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed
    value: 24
  tensor_parallel_size:
    type: categorical
    values: [1,2,4,8]

  vllm_args:
    type: combinations
    args:
      disable_uvicorn_access_log: true
      no_enable_prefix_caching: true # disable GPU prefix caching
      gpu_memory_utilization:
        values: [0.90]
      kv_connector:
        values:
          - type: "offloading"
            # This (* TP size) must agree with the pod's requested memory
            cpu_bytes: 322122547200
            role: "kv_both"

load_generation:
  tool: "vllm-bench-serve"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  # Run benchmark twice: first run populates the CPU cache, second run cache hits.
  clone_run: true
  benchmark_args:
    type: combinations
    args:
      dataset_name: random
      random_input_len:
        values: [1000, 2000, 4000, 10000, 20000, 40000, 128000]
      random_output_len: 1
      max_concurrency: 1
      num_prompts: 30
      ignore_eos: true
      # seed is auto-generated
