# Checked-in defaults loaded by run-sweep.py. Put overrides in runtime.yaml, or
# pass --runtime-config /path/to/file.yaml. Host environment variables override
# this defaults file. If an override YAML file is detected, mapped host runtime
# env vars are ignored so that file is the source of truth.

sweep:
  results_dir: results/sweeps
  env_vars:
    LMCACHE_LOG_LEVEL: WARNING
    HIPFILE_STATS_LEVEL: "0"

secrets:
  # Prefer a token file or ${HF_TOKEN} substitution over a literal token.
  hf_token_file: "${HF_TOKEN_FILE:-}"

env_vars:
  LMCACHE_INTERNAL_API_SERVER_ENABLED: "true"
  LMCACHE_INTERNAL_API_SERVER_HOST: 0.0.0.0
  LMCACHE_INTERNAL_API_SERVER_PORT: "6999"
