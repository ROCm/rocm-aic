# Checked-in defaults loaded by recipe launchers. Put overrides in runtime.yaml,
# or set RECIPE_RUNTIME_FILE=/path/to/runtime.yaml. Existing environment
# variables and make VAR=value overrides still win.

host:
  gpu: 0
  data: /mnt/lmcache-nvme
  log: recipies/vllm-lmcache-nixl/logs
  hf_home: ~/.cache/huggingface
  timezone: America/Edmonton

secrets:
  hf_token_file: "${HF_TOKEN_FILE:-}"

server:
  # model: Qwen/Qwen2.5-3B-Instruct
  dev_mode: true
  gpu_memory_utilization: 0.90
  max_model_len:
  max_num_batched_tokens:
  enforce_eager: true
  enable_mfu_metrics: true
  pytorch_alloc_conf: expandable_segments:True

lmcache:
  io: nixl-posix
  log_level: INFO
  enable_chunk_statistics: true
  chunk_statistics_strategy: file_hash
  enable_kv_events: true

nixl:
  buffer_size: 512
  buffer_device: cuda
  pool_size: 4096
  docker_nofile: 1048576
  plugin_dir: /opt/nixl/lib/x86_64-linux-gnu/plugins
  hipfile_stats_level: 0

slurm:
  shared_root: /scratch/${USER}/vllm-lmcache-nixl
  hf_home: /scratch/${USER}/vllm-lmcache-nixl/hf
  gutenberg_data_root: /scratch/${USER}/vllm-lmcache-nixl/gutenberg
  nvme_auto_use: true
  nvme_scratch_fallback: true
  nvme_mkfs: true
  constraint: MARKHAM&NVME
  benchmark: gutenberg

benchmark:
  run_long_parallel: true
  workers: 4
  iterations: 1
  base_seed: 42
  max_tokens: 512
