# LMCache NIXL storage backend — AIS (hipFile) on ROCm.

chunk_size: 256
local_cpu: false
save_decode_cache: true
pre_caching_hash_algorithm: sha256_cbor
nixl_buffer_size: 1073741824
nixl_buffer_device: cpu
nixl_pool_size: 64

extra_config:
  enable_nixl_storage: true
  nixl_backend: AIS
  use_direct_io: true
