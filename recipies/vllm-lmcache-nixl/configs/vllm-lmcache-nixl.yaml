# vllm-lmcache-nixl: LMCache + vLLM + NIXL (ROCm) defaults.

lmcache_paths:
  subdir: lmcache

lmcache_nixl_posix: "/app/configs/lmcache-nixl-posix.yml"
lmcache_nixl_ais: "/app/configs/lmcache-nixl-ais.yml"

vllm_kv_transfer:
  kv_connector: LMCacheConnectorV1
  kv_role: kv_both

vllm:
  host: "0.0.0.0"
  tensor_parallel_size: 1
  block_size: 64
  stream_interval: 20
  attention_backend: "ROCM_AITER_UNIFIED_ATTN"
  model_default: "openai/gpt-oss-120b"
  max_model_len_default: "32768"
  max_num_batched_tokens_default: "8192"
  gpu_memory_utilization_default: "0.90"

serve:
  load_format: "auto"
  use_ais_stats_wrapper: false
  clear_gds_dir_before_start: true
  disable_uvicorn_access_log: true
  enable_mfu_metrics: true

nixl:
  install_prefix: "/opt/nixl"
  ucx_prefix: "/opt/rocnixl-ucx"
  plugin_dir: "/opt/nixl/lib/x86_64-linux-gnu/plugins"
