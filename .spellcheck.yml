matrix:
  - name: Markdown
    aspell:
      lang: en
    dictionary:
      wordlists:
        - .wordlist.txt
      encoding: utf-8
    pipeline:
      - pyspelling.filters.markdown:
          markdown_extensions:
            - markdown.extensions.fenced_code:
      - pyspelling.filters.html:
          ignores:
            - code
            - pre
    sources:
      - '**/*.md'
    default_encoding: utf-8
