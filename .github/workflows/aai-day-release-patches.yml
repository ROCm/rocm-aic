#
# Lightweight push-triggered CI for the aai-day-release recipe.
# Validates that all LMCache and NIXL patches apply cleanly against their
# pinned upstream SHAs without requiring a full Docker build.
#
name: aai-day-release patch validation

on:
  push:
    branches: [aai-day]
    paths:
      - 'aai-day-release/Dockerfile'
      - 'aai-day-release/patches/**'
      - 'recipies/common/nixl/patches/**'
      - 'recipies/common/nixl/overlay/**'
      - '.github/workflows/aai-day-release-patches.yml'
  pull_request:
    branches: [main]
    paths:
      - 'aai-day-release/Dockerfile'
      - 'aai-day-release/patches/**'
      - 'recipies/common/nixl/patches/**'
      - 'recipies/common/nixl/overlay/**'
      - '.github/workflows/aai-day-release-patches.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lmcache-patches:
    name: LMCache patches (git apply --check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve LMCache SHA and URL from Dockerfile
        id: meta
        working-directory: aai-day-release
        run: |
          set -euo pipefail
          sha="$(grep -E '^ARG LMCACHE_SHA=' Dockerfile | head -1 | cut -d= -f2-)"
          url="$(grep -E '^ARG LMCACHE_GIT_URL=' Dockerfile | head -1 | cut -d= -f2-)"
          test -n "${sha}" || { echo "LMCACHE_SHA not set in Dockerfile"; exit 1; }
          test -n "${url}" || { echo "LMCACHE_GIT_URL not set in Dockerfile"; exit 1; }
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "LMCache: ${url} @ ${sha}"

      - name: Clone LMCache at pinned SHA
        run: |
          set -euo pipefail
          git clone --filter=blob:none "${{ steps.meta.outputs.url }}" /tmp/LMCache
          cd /tmp/LMCache
          git fetch --depth 1 origin "${{ steps.meta.outputs.sha }}"
          git checkout "${{ steps.meta.outputs.sha }}"
          echo "Checked out: $(git log --oneline -1)"

      - name: Verify all LMCache patches apply cleanly
        run: |
          set -euo pipefail
          patch_dir="${GITHUB_WORKSPACE}/aai-day-release/patches/lmcache"
          shopt -s nullglob
          patches=( "${patch_dir}"/*.patch )
          if (( ${#patches[@]} == 0 )); then
            echo "ERROR: no .patch files in ${patch_dir}" >&2
            exit 1
          fi
          cd /tmp/LMCache
          for patch in "${patches[@]}"; do
            echo "==> git apply --check $(basename ${patch})"
            if git apply --check "${patch}" 2>/dev/null; then
              echo "    OK (applies cleanly)"
            else
              # Check if it was already merged
              if git apply --check --reverse "${patch}" 2>/dev/null; then
                echo "    SKIP (already merged upstream)"
              else
                echo "    FAIL: patch does not apply and is not already merged"
                git apply --check "${patch}"  # re-run to show error
                exit 1
              fi
            fi
          done
          echo "All LMCache patches OK"

  nixl-patches:
    name: NIXL patches (git apply --check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve NIXL SHA and URL from Dockerfile
        id: meta
        working-directory: aai-day-release
        run: |
          set -euo pipefail
          sha="$(grep -E '^ARG NIXL_SHA=' Dockerfile | head -1 | cut -d= -f2-)"
          url="$(grep -E '^ARG NIXL_GIT_URL=' Dockerfile | head -1 | cut -d= -f2-)"
          test -n "${sha}" || { echo "NIXL_SHA not set in Dockerfile"; exit 1; }
          test -n "${url}" || { echo "NIXL_GIT_URL not set in Dockerfile"; exit 1; }
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "NIXL: ${url} @ ${sha}"

      - name: Clone NIXL at pinned SHA
        run: |
          set -euo pipefail
          git clone --filter=blob:none "${{ steps.meta.outputs.url }}" /tmp/nixl
          cd /tmp/nixl
          git fetch --depth 1 origin "${{ steps.meta.outputs.sha }}"
          git checkout "${{ steps.meta.outputs.sha }}"
          echo "Checked out: $(git log --oneline -1)"

      - name: Verify NIXL patches apply cleanly
        run: |
          set -euo pipefail
          patch_dir="${GITHUB_WORKSPACE}/aai-day-release/patches/nixl"
          shopt -s nullglob
          patches=( "${patch_dir}"/*.patch )
          if (( ${#patches[@]} == 0 )); then
            echo "ERROR: no .patch files in ${patch_dir}" >&2
            exit 1
          fi
          cd /tmp/nixl
          for patch in "${patches[@]}"; do
            echo "==> git apply --check $(basename ${patch})"
            if git apply --check "${patch}" 2>/dev/null; then
              echo "    OK (applies cleanly)"
            else
              if git apply --check --reverse "${patch}" 2>/dev/null; then
                echo "    SKIP (already merged upstream)"
              else
                echo "    FAIL: patch does not apply and is not already merged"
                git apply --check "${patch}"
                exit 1
              fi
            fi
          done
          echo "All NIXL patches OK"
