name: vllm-lmcache-hipfile Python

on:
  pull_request:
    branches: [main]
    paths:
      - 'recipies/vllm-lmcache-hipfile/scripts/**'
      - 'recipies/common/scripts/**'
      - 'recipies/common/tests/**'
      - 'requirements.txt'
      - '.github/workflows/vllm-lmcache-hipfile-python.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: recipe scripts and common observability
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipies/vllm-lmcache-hipfile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install host dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r "${GITHUB_WORKSPACE}/requirements.txt"

      - name: py_compile recipe scripts
        run: |
          set -euo pipefail
          python -m py_compile scripts/*.py

      - name: rocm-aic-exporter (fixture tree)
        run: |
          set -euo pipefail
          prom="${RUNNER_TEMP}/rocm_aic_exporter.prom"
          python3 ../../common/scripts/rocm-aic-exporter.py \
            --data-root ../../common/tests/fixtures/lmcache-exporter \
            --prometheus-textfile "${prom}" \
            --textfile-only \
            --skip-nfsiostat-invoke \
            --json >/dev/null
          grep -q 'rocm_aic_kv_disk_files' "${prom}"
          grep -q 'rocm_aic_kv_file_hits_histogram_bucket' "${prom}"
          grep -q 'rocm_aic_nfsiostat_present' "${prom}"
          grep -q 'rocm_aic_hipconfig_present' "${prom}"
          python3 -c "
          from importlib.machinery import SourceFileLoader
          from pathlib import Path
          m = SourceFileLoader('ex', '../../common/scripts/rocm-aic-exporter.py').load_module()
          mounts = m._parse_mountstats_nfs(
              Path('../../common/tests/fixtures/mountstats-nfs.sample'))
          assert len(mounts) == 1 and mounts[0].rx_bytes == 9100
          snap = m.collect_exporter_snapshot(
              data_root=Path('../../common/tests/fixtures/lmcache-exporter'),
              include_host_metrics=False,
              run_nfsiostat=False,
              collect_hip=False,
          )
          body_kv = m.format_prometheus_textfile(
              snap, include_host_metrics=False)
          assert 'rocm_aic_nfsiostat_present' not in body_kv
          snap_h = m.collect_exporter_snapshot(
              data_root=Path('../../common/tests/fixtures/lmcache-exporter'),
              include_host_metrics=True,
              run_nfsiostat=False,
              collect_hip=False,
          )
          body_all = m.format_prometheus_textfile(
              snap_h, include_host_metrics=True)
          assert 'rocm_aic_nfsiostat_present' in body_all
          "

      - name: parse-vllm-engine-log-timeseries (CSV only)
        run: |
          set -euo pipefail
          csv="${RUNNER_TEMP}/engine_timeseries.csv"
          python3 ../../common/scripts/parse-vllm-engine-log-timeseries.py \
            ../../common/tests/fixtures/engine-log-sample.txt \
            --engine 0 \
            --year 2026 \
            --csv "${csv}" \
            --svg "${RUNNER_TEMP}/engine_timeseries.svg"
          test -s "${csv}"
          test "$(wc -l < "${csv}")" -ge 2
