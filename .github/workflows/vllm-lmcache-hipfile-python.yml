name: vllm-lmcache-hipfile Python

on:
  pull_request:
    branches: [main]
    paths:
      - 'recipies/vllm-lmcache-hipfile/scripts/**'
      - 'recipies/common/scripts/**'
      - 'recipies/common/tests/**'
      - 'requirements.txt'
      - '.github/workflows/vllm-lmcache-hipfile-python.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: recipe scripts and common observability
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipies/vllm-lmcache-hipfile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install host dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r "${GITHUB_WORKSPACE}/requirements.txt"

      - name: py_compile recipe scripts
        run: |
          set -euo pipefail
          python -m py_compile scripts/*.py

      - name: rocm-aic-exporter (fixture tree)
        run: |
          set -euo pipefail
          prom="${RUNNER_TEMP}/rocm_aic_exporter.prom"
          python3 ../../common/scripts/rocm-aic-exporter.py \
            --data-root ../../common/tests/fixtures/lmcache-exporter \
            --prometheus-textfile "${prom}" \
            --textfile-only \
            --skip-nfsiostat-invoke \
            --skip-kfd-ais-bpftrace \
            --json >/dev/null
          grep -q 'rocm_aic_kv_disk_files' "${prom}"
          grep -q 'rocm_aic_kv_file_hits_histogram_bucket' "${prom}"
          grep -q 'rocm_aic_chunk_lookup_histogram_bucket' "${prom}"
          grep -q 'rocm_aic_chunk_stats_lookup_rows 1' "${prom}"
          grep -q 'rocm_aic_nixl_pool_files' "${prom}"
          grep -q 'rocm_aic_nixl_pool_slots_used' "${prom}"
          grep -q 'rocm_aic_nixl_pool_bytes_total' "${prom}"
          grep -q 'rocm_aic_nfsiostat_present' "${prom}"
          grep -q 'rocm_aic_hipconfig_present' "${prom}"
          prom_nixl="${RUNNER_TEMP}/rocm_aic_exporter_nixl.prom"
          python3 ../../common/scripts/rocm-aic-exporter.py \
            --data-root ../../common/tests/fixtures/lmcache-exporter-nixl \
            --prometheus-textfile "${prom_nixl}" \
            --textfile-only \
            --skip-nfsiostat-invoke \
            --skip-kfd-ais-bpftrace \
            --json >/dev/null
          grep -q 'rocm_aic_nixl_pool_files 2' "${prom_nixl}"
          grep -q 'rocm_aic_nixl_pool_slots_used 2' "${prom_nixl}"
          grep -q 'rocm_aic_nixl_pool_bytes_total 12288' "${prom_nixl}"
          grep -q 'rocm_aic_nixl_pool_present 1' "${prom_nixl}"
          grep -q 'rocm_aic_kv_disk_files 0' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_stats_lookup_rows 3' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_hashes_tracked 2' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_hash_mention_sum 4' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_lookup_histogram_bucket{le="20"}' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_hashes_by_lookup_count{lookup_count="3"} 1' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_hashes_by_lookup_count{lookup_count="1"} 1' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_hashes_by_lookup_count{lookup_count="11-20"} 0' "${prom_nixl}"
          grep -q 'rocm_aic_chunk_hashes_by_lookup_count{lookup_count=">100"} 0' "${prom_nixl}"
          python3 -c "
          from importlib.machinery import SourceFileLoader
          from pathlib import Path
          m = SourceFileLoader('ex', '../../common/scripts/rocm-aic-exporter.py').load_module()
          mounts = m._parse_mountstats_nfs(
              Path('../../common/tests/fixtures/mountstats-nfs.sample'))
          assert len(mounts) == 1 and mounts[0].rx_bytes == 9100
          snap = m.collect_exporter_snapshot(
              data_root=Path('../../common/tests/fixtures/lmcache-exporter'),
              include_host_metrics=False,
              run_nfsiostat=False,
              collect_hip=False,
          )
          body_kv = m.format_prometheus_textfile(
              snap, include_host_metrics=False)
          assert 'rocm_aic_nfsiostat_present' not in body_kv
          snap_h = m.collect_exporter_snapshot(
              data_root=Path('../../common/tests/fixtures/lmcache-exporter'),
              include_host_metrics=True,
              run_nfsiostat=False,
              collect_hip=False,
          )
          body_all = m.format_prometheus_textfile(
              snap_h, include_host_metrics=True)
          assert 'rocm_aic_nfsiostat_present' in body_all
          sample_text = Path('../../common/tests/fixtures/kfd-ais-bpftrace.sample').read_text()
          samples = m.parse_kfd_ais_bpftrace_lines(sample_text)
          assert len(samples) == 5
          kfd = m.summarize_kfd_ais_samples(
              samples,
              sample_seconds=10.0,
              bpftrace_present=True,
              kprobe_attachable=True,
          )
          assert kfd.operations[('read', 'success')] == 3
          assert kfd.operations[('write', 'success')] == 1
          assert kfd.operations[('read', 'error')] == 1
          assert kfd.bytes_by_direction['read'] == 4718592 * 3
          assert kfd.latency_us_count == 4
          kfd_body = m.format_prometheus_textfile(
              m.ExporterSnapshot(
                  chunk=snap.chunk,
                  nfs=snap_h.nfs,
                  hip=snap_h.hip,
                  kfd_ais=kfd,
                  host_metrics_collected=True,
              ),
              include_host_metrics=True,
          )
          assert 'rocm_aic_kfd_ais_rw_operations{direction=\"read\",outcome=\"success\"} 3' in kfd_body
          assert 'rocm_aic_kfd_ais_latency_microseconds_count' in kfd_body
          "

      - name: parse-vllm-engine-log-timeseries (CSV only)
        run: |
          set -euo pipefail
          csv="${RUNNER_TEMP}/engine_timeseries.csv"
          python3 ../../common/scripts/parse-vllm-engine-log-timeseries.py \
            ../../common/tests/fixtures/engine-log-sample.txt \
            --engine 0 \
            --year 2026 \
            --csv "${csv}" \
            --svg "${RUNNER_TEMP}/engine_timeseries.svg"
          test -s "${csv}"
          test "$(wc -l < "${csv}")" -ge 2
