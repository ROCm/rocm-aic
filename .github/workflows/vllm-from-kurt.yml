name: vLLM Kurt recipe

on:
  push:
    branches: [main]
    paths:
      - 'recipies/vllm-from-kurt/**'
      - '.github/workflows/vllm-from-kurt.yml'
  pull_request:
    branches: [main]
    paths:
      - 'recipies/vllm-from-kurt/**'
      - '.github/workflows/vllm-from-kurt.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: vllm-from-kurt-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Hadolint, build, and image artifact
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      IMAGE_NAME: vllm-kurt
      IMAGE_TAG: ci
      ROCM_ARCH_CI: gfx942
    steps:
      - uses: actions/checkout@v4

      - name: Hadolint (recipe Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: recipies/vllm-from-kurt/Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

      - name: Free disk space for large ROCm image build
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: false

      - uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: recipies/vllm-from-kurt
          file: recipies/vllm-from-kurt/Dockerfile
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          load: true
          build-args: |
            ROCM_ARCH=${{ env.ROCM_ARCH_CI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image as compressed tarball (CI artifact)
        run: |
          set -euo pipefail
          out="${RUNNER_TEMP}/${IMAGE_NAME}-${IMAGE_TAG}-amd64-rocm-${ROCM_ARCH_CI}.tar.gz"
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" | gzip -1 > "${out}"
          ls -lh "${out}"

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}-amd64-rocm-${{ env.ROCM_ARCH_CI }}
          path: ${{ runner.temp }}/${{ env.IMAGE_NAME }}-${{ env.IMAGE_TAG }}-amd64-rocm-${{ env.ROCM_ARCH_CI }}.tar.gz
          if-no-files-found: error
          retention-days: 7
