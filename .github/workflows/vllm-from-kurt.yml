name: vLLM Kurt recipe

on:
  push:
    branches: [main]
    paths:
      - 'recipies/vllm-from-kurt/**'
      - '.github/workflows/vllm-from-kurt.yml'
  pull_request:
    branches: [main]
    paths:
      - 'recipies/vllm-from-kurt/**'
      - '.github/workflows/vllm-from-kurt.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vllm-from-kurt-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Hadolint (recipe Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: recipies/vllm-from-kurt/Dockerfile
          config: .hadolint.yaml
          failure-threshold: error
