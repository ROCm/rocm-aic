#
# Full image build (~10GB+ layers). GitHub-hosted runners often run out of
# disk on cold builds; PRs use vllm-lmcache-hipfile-lmcache-patches.yml instead.
# Run this workflow manually after Dockerfile or patch changes.
#
name: vllm-lmcache-hipfile Docker

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: vllm-lmcache-hipfile
  ROCM_ARCH: gfx942

jobs:
  build:
    name: Build image (BuildKit GHA cache)
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo docker system prune -af --volumes || true
          echo "Disk after cleanup:"
          df -h /

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build vllm-lmcache-hipfile (no load; saves runner disk)
        uses: docker/build-push-action@v6
        with:
          context: recipies/vllm-lmcache-hipfile
          file: recipies/vllm-lmcache-hipfile/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:ci
          build-args: |
            ROCM_ARCH=${{ env.ROCM_ARCH }}
          cache-from: type=gha,scope=vllm-lmcache-hipfile
          cache-to: type=gha,mode=max,scope=vllm-lmcache-hipfile
