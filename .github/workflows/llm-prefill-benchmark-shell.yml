name: llm-prefill-benchmark Shell

on:
  pull_request:
    branches: [main]
    paths:
      - 'benchmarks/llm-prefill-benchmark/**'
      - 'recipies/vllm-lmcache-hipfile/tests/bin/**'
      - '.github/workflows/llm-prefill-benchmark-shell.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-long-smoke:
    name: run-long discovery and mock API
    runs-on: ubuntu-latest
    env:
      MOCK_PATH_PREFIX: ${{ github.workspace }}/recipies/vllm-lmcache-hipfile/tests/bin
      RUN_LONG_STREAM_CHAT: ${{ github.workspace }}/recipies/vllm-lmcache-hipfile/tests/bin/stream-chat-completion.py
    defaults:
      run:
        working-directory: benchmarks/llm-prefill-benchmark
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Single-book run-long (mock stream-chat-completion)
        env:
          BOOK_DATA_ROOT: ${{ github.workspace }}/benchmarks/llm-prefill-benchmark/tests/fixtures
          BOOK_SLUG: ci-mini-book
          ITERATIONS: '1'
          RUN_LONG_SEED: '42'
        run: |
          set -euo pipefail
          test -x "${RUN_LONG_STREAM_CHAT}"
          ./run-long.sh 2>&1 | tee "${RUNNER_TEMP}/run-long.log"
          grep -q 'run-long: library mode' "${RUNNER_TEMP}/run-long.log" && exit 1 || true
          grep -q 'run-long: iteration=1/1' "${RUNNER_TEMP}/run-long.log"

      - name: BOOK_SLUG_FILE allowlist
        env:
          BOOK_DATA_ROOT: ${{ github.workspace }}/benchmarks/llm-prefill-benchmark/tests/fixtures
          BOOK_SLUG_FILE: ${{ github.workspace }}/benchmarks/llm-prefill-benchmark/tests/fixtures/ci-slugs.txt
          ITERATIONS: '1'
          RUN_LONG_SEED: '43'
        run: |
          set -euo pipefail
          printf '%s\n' ci-mini-book > "${BOOK_SLUG_FILE}"
          ./run-long.sh 2>&1 | tee "${RUNNER_TEMP}/run-long-allowlist.log"
          grep -q 'subset=ci-mini-book' "${RUNNER_TEMP}/run-long-allowlist.log"
          grep -q 'books=1' "${RUNNER_TEMP}/run-long-allowlist.log"

      - name: run-long-parallel (2 workers, mock stream-chat-completion)
        env:
          BOOK_DATA_ROOT: ${{ github.workspace }}/benchmarks/llm-prefill-benchmark/tests/fixtures
          BOOK_SLUG: ci-mini-book
          PROGRESS: '0'
        run: |
          set -euo pipefail
          WORKERS=2 ITERATIONS=1 BASE_SEED=100 \
            OUTPUT_DIR="${RUNNER_TEMP}/parallel-out" \
            ./run-long-parallel.sh
          test -f "${RUNNER_TEMP}/parallel-out/"*/worker-0.jsonl
          test -f "${RUNNER_TEMP}/parallel-out/"*/worker-1.jsonl
