name: vllm-lmcache-hipfile LMCache patches

on:
  pull_request:
    branches: [main]
    paths:
      - 'recipies/vllm-lmcache-hipfile/Dockerfile'
      - 'recipies/vllm-lmcache-hipfile/patches/**'
      - '.github/workflows/vllm-lmcache-hipfile-lmcache-patches.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply-check:
    name: git apply --check (LMCache @ LMCACHE_SHA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recipies/vllm-lmcache-hipfile

    steps:
      - uses: actions/checkout@v4

      - name: Resolve LMCACHE_SHA from Dockerfile
        id: meta
        run: |
          set -euo pipefail
          sha="$(grep -E '^ARG LMCACHE_SHA=' Dockerfile | head -1 | cut -d= -f2-)"
          test -n "${sha}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"

      - name: Clone LMCache and verify patches apply
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          patch_dir="${GITHUB_WORKSPACE}/recipies/vllm-lmcache-hipfile/patches"
          shopt -s nullglob
          patches=( "${patch_dir}"/*.patch )
          if (( ${#patches[@]} == 0 )); then
            echo "No .patch files in ${patch_dir}" >&2
            exit 1
          fi
          rm -rf /tmp/LMCache
          git clone --filter=blob:none \
            https://github.com/riley-dixon/LMCache.git /tmp/LMCache
          cd /tmp/LMCache
          git fetch --depth 1 origin "${{ steps.meta.outputs.sha }}"
          git checkout "${{ steps.meta.outputs.sha }}"
          for patch in "${patches[@]}"; do
            echo "==> git apply --check ${patch}"
            git apply --check "${patch}"
          done
