name: vllm-radeon Docker

on:
  pull_request:
    branches: [main]
    paths:
      - 'recipies/vllm-radeon/Dockerfile'
      - 'recipies/vllm-radeon/patches/**'
      - 'recipies/vllm-radeon/scripts/vllm-server'
      - 'recipies/vllm-radeon/configs/**'
      - '.github/workflows/vllm-radeon-docker.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: vllm-radeon
  ROCM_ARCH: gfx942

jobs:
  build:
    name: Build image (BuildKit GHA cache)
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build vllm-radeon (no push)
        uses: docker/build-push-action@v6
        with:
          context: recipies/vllm-radeon
          file: recipies/vllm-radeon/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          build-args: |
            ROCM_ARCH=${{ env.ROCM_ARCH }}
          cache-from: type=gha,scope=vllm-radeon
          cache-to: type=gha,mode=max,scope=vllm-radeon

      - name: Verify image entrypoint
        run: |
          set -euo pipefail
          docker run --rm --entrypoint python3 "${IMAGE_NAME}:ci" \
            -c "import pathlib; p=pathlib.Path('/app/scripts/vllm-server'); assert p.is_file(), p"
