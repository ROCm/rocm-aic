# InferencePool configuration for tiered prefix cache with AMD GPUs
# This configuration enables CPU-tier prefix cache scoring
# Based on llm-d/guides/tiered-prefix-cache/cpu/manifests/inferencepool/values.yaml

inferencePool:
  modelServers:
    matchLabels:
      "llm-d.ai/inference-serving": "true"

inferenceExtension:
  flags:
    # vLLM 10.0+ renamed the metric, GAIE still uses old name as default
    kv-cache-usage-percentage-metric: "vllm:kv_cache_usage_perc"

  monitoring:
    prometheus:
      enable: true

  # Configure scorers via custom plugins config
  pluginsConfigFile: "custom-plugins.yaml"
  pluginsCustomConfig:
    custom-plugins.yaml: |
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: prefix-cache-scorer
        name: gpu-prefix-cache-scorer
      - type: prefix-cache-scorer
        name: cpu-prefix-cache-scorer
        parameters:
          autoTune: false  # vLLM doesn't have CPU capacity metric yet
          lruCapacityPerServer: 41000  # ~100GB for Qwen-32B: 41,000 blocks * 2.5MB/block
      schedulingProfiles:
      - name: default
        plugins:
        - pluginRef: queue-scorer
          weight: 2.0
        - pluginRef: kv-cache-utilization-scorer
          weight: 2.0
        - pluginRef: gpu-prefix-cache-scorer
          weight: 1.0
        - pluginRef: cpu-prefix-cache-scorer
          weight: 1.0
