apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Use the LMCache flavor from tiered-prefix-cache (decoupled from llm-d submodule)
resources:
  - ../lmcache

# Apply components for additional functionality
components:
  - ../../components/hostpath-models
  - ../../components/hipfile

# Note: Benchmark harness will override this definition with
#       the LMCache config file out of bench sweep declaration
configMapGenerator:
  - name: config-map
    behavior: replace
    literals:
      - |
        lmcache_config.yaml=chunk_size: 256
        save_decode_cache: false
        local_cpu: false
        use_gds: true
        gds_backend: "hipfile"
        gds_path: "/hipfile-of"
        gds_buffer_size: 16384
        extra_config:
          gds_io_threads:
            values: [16]

# Benchmark harness injects vLLM args and LMCache connector out of bench sweep declaration
patches:
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache
