apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Use the LMCache flavor from tiered-prefix-cache (decoupled from llm-d submodule)
resources:
  - ../lmcache

# Apply components for additional functionality
components:
  - ../../components/hostpath-models
  - ../../components/hipfile

# Benchmark harness injects LMCache config file out of bench sweep declaration
configMapGenerator:
  - name: config-map
    behavior: replace
    literals:
      - |
        lmcache_config.yaml=chunk_size: 256
        save_decode_cache: True
        local_cpu: false
        gds_path: "/hipfile/lmcache"
        cufile_buffer_size: 8192
        extra_config:
          use_hipfile: true
          use_cufile: false
          use_direct_io: true
        remote_url: null

# Benchmark harness injects vLLM args and LMCache connector out of bench sweep declaration
patches:
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache
