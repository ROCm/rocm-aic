apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Component for adding hostpath volumes for model storage
# This can be applied to any vllm deployment flavor

patches:
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: HUGGINGFACE_HUB_CACHE
          value: "/models"
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: models
          hostPath:
            path: /data/models-cache
            type: Directory
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: models
          mountPath: "/models"
          readOnly: true
