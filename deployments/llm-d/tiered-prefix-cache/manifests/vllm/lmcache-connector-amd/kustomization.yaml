apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base manifest from llm-d submodule
resources:
  - ../../../../../../submodules/llm-d/guides/tiered-prefix-cache/cpu/manifests/vllm/lmcache-connector-amd

patches:
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/vcave/vllm:rocm_721-vllm_20260401-lmcache
      - op: replace
        path: /spec/template/spec/containers/0/args/0
        value: |-
          exec vllm serve \
            Qwen/Qwen3-32B \
            --tensor-parallel-size 2 \
            --kv-transfer-config '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}' \
            --port 8000 \
            --max-num-seq 1024 \
            --gpu-memory-utilization 0.25 \
            --disable-uvicorn-access-log \
            --enable_prefix_caching
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: LMCACHE_MAX_LOCAL_CPU_SIZE
          value: "100.0"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PYTHONHASHSEED
          value: "123"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PROMETHEUS_MULTIPROC_DIR
          value: "/tmp/lmcache_prometheus"
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            amd.com/gpu: 2
          requests:
            amd.com/gpu: 2
            memory: 400G
