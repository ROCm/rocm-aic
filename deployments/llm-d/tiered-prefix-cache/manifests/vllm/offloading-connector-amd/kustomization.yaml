apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base manifest from llm-d submodule
resources:
  - ../../../../../../submodules/llm-d/guides/tiered-prefix-cache/cpu/manifests/vllm/offloading-connector-amd

patches:
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/args/0
        value: |-
          exec vllm serve \
            Qwen/Qwen3-32B \
            --tensor-parallel-size 2 \
            --kv-transfer-config '{"kv_connector":"OffloadingConnector","kv_role":"kv_both","kv_connector_extra_config":{"cpu_bytes_to_use":107374182400}}' \
            --port 8000 \
            --max-num-seq 1024 \
            --gpu-memory-utilization 0.25 \
            --disable-uvicorn-access-log
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            amd.com/gpu: 2
          requests:
            amd.com/gpu: 2
            memory: 400G
