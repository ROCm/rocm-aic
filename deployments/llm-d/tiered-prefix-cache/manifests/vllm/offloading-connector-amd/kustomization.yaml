apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base manifest from llm-d submodule
resources:
  - ../../../../../../../../submodules/llm-d/guides/tiered-prefix-cache/cpu/manifests/vllm/offloading-connector-amd

# Override or add vLLM serve arguments
patches:
  # Override the vLLM serve command arguments
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args/0
        value: |-
          exec vllm serve \
            Qwen/Qwen3-32B \
            --tensor-parallel-size 2 \
            --kv-transfer-config '{"kv_connector":"OffloadingConnector","kv_role":"kv_both","kv_connector_extra_config":{"cpu_bytes_to_use":107374182400}}' \
            --port 8000 \
            --max-num-seq 1024 \
            --gpu-memory-utilization 0.25 \
            --disable-uvicorn-access-log

  # Example: Override GPU/memory resources (optional - uncomment to use)
  # - target:
  #     kind: Deployment
  #     name: llm-d-model-server
  #   patch: |-
  #     - op: replace
  #       path: /spec/template/spec/containers/0/resources/requests/memory
  #       value: 500G
