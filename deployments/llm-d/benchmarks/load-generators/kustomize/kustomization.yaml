# Shared kustomization template for all load generator benchmarks
# This file is copied to the manifests directory, and pod.yaml is generated there

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- pod.yaml

patches:
- target:
    kind: Pod
  patch: |-
    apiVersion: v1
    kind: Pod
    metadata:
      name: placeholder  # Name doesn't matter, target selector handles matching
    spec:
      volumes:
      - name: results
        hostPath:
          path: /mnt/rocm-icms-cache/benchmark-results
          type: DirectoryOrCreate
