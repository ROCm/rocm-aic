name: "agentic-multiturn-lmcache-gpu-cpu-calibration"
description: "Agentic multi-turn GPU+CPU cache"
deployment: "tiered-prefix-cache-lmcache"
deployment_template: "tiered-prefix-cache-lmcache-hipfile-kustomization.yaml.tmpl"

env_vars:
  HIPFILE_STATS_LEVEL: "0"
  LMCACHE_INTERNAL_API_SERVER_ENABLED: "true"
  LMCACHE_INTERNAL_API_SERVER_PORT_START: "6990"
  MIOPEN_USER_DB_PATH: "/app/miopen"
  MIOPEN_FIND_MODE: "FAST"
  AMDGCN_USE_BUFFER_OPS: "0"
  LMCACHE_LOG_LEVEL: "INFO"

parameters:
  image:
    type: categorical
    values:
      - "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  model:
    type: fixed
    value: "openai/gpt-oss-120b"
  replicas:
    type: categorical
    values: [1]
  tensor_parallel_size:
    type: categorical
    values: [1]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed
    # 112 available
    value: "100"

  vllm_args:
    type: combinations
    args:
      disable_uvicorn_access_log: true
      enable_prefix_caching: true
      # with vllm 0.19.0: "0.50" only yields '22.23' GiB for KV
      # "0.20" reports -32 GiB; something is off somewhere
      gpu_memory_utilization:
        values: [0.50]
      kv_cache_metrics: true
      enable_mfu_metrics: true
      kv_connector:
        values:
          - type: "lmcache"
            role: "kv_both"

  lmcache_args:
    type: combinations
    args:
      chunk_size:
        values: [256]
      save_decode_cache: false
      local_cpu: true
      max_local_cpu_size:
        values: [40]

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  workload_file: "gutenberg_agent_multi_turn_calibration.json"
  benchmark_args:
    type: pairwise
    args:
      num_clients:
        values: [8, 16, 32]
      max_active_conversations:
        values: [256, 256, 256]
      conversation_sampling: random
      warmup_step: true
      max_retries: 5
      #no_early_stop: true
      request_timeout_sec: 3600
      verbose: false
      excel_output: true
      seed: 42
