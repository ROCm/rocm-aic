# SGLang serving engine benchmark configuration
# Uses native SGLang argument names as they appear in SGLang documentation

name: "inference-scheduling-sglang"
description: "SGLang serving engine benchmark"
deployment: "inference-scheduling-sglang"
deployment_template: "inference-scheduling-sglang-kustomization.yaml.tmpl"
serving_engine: "sglang"

parameters:
  model:
    type: categorical
    values:
      - "openai/gpt-oss-120b"

  # Need at least TP=4 for large models
  tensor_parallel_size:
    type: categorical
    values: [4]

  # Native SGLang argument names - match SGLang CLI exactly
  # Users can reference SGLang documentation directly
  sglang_args:
    type: combinations
    args:
      max_running_requests: 1024
      mem_fraction_static: 0.90
      # SGLang's prefix caching via FlashInfer
      enable_flashinfer: true
      # Longest Prefix Match scheduling
      schedule_policy: "lpm"
      chunked_prefill_size: 4096

load_generation:
  tool: "vllm-bench-serve"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  benchmark_args:
    type: combinations
    args:
      dataset_name: random
      random_input_len:
        values: [8000]
      random_output_len: 1000
      max_concurrency:
        values: [8, 16, 32, 64]
      num_prompts: 10 * {max_concurrency}
      ignore_eos: true
      # seed is auto-generated