name: "test-model-sglang-sweep"
description: "Test health of various models against sglang (TP=4)"
deployment: "inference-scheduling-sglang"
serving_engine: "sglang"

# Model-specific information:

# Kimi:
# - requires `trust-remote-code: true`
# - requires pod Memory else OOMKilled

parameters:
  model:
    type: categorical
    values:
      - "Qwen/Qwen3-32B"
      - "amd/DeepSeek-R1-0528-MXFP4"
      - "amd/Kimi-K2.5-MXFP4"
      - "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      - "amd/gpt-oss-120b-w-mxfp4-a-fp8"
      - "openai/gpt-oss-120b"

# Need at least TP=4 for large models
  tensor_parallel_size:
    type: fixed
    value: 4
  sglang_args:
    type: combinations
    args:
      trust-remote-code: true # for kimi
      max_running_requests: 1024
      mem_fraction_static: 0.90
      # SGLang's prefix caching via FlashInfer
      enable_flashinfer: true
      # Longest Prefix Match scheduling
      schedule_policy: "lpm"
      chunked_prefill_size: 4096

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  workload_file: "small_multi_turn.json"
  benchmark_args:
    num_clients: 5
    max_active_conversations: 5
    verbose: false