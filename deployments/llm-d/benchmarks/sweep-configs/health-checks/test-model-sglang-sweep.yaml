name: "test-model-sglang-sweep"
description: "Test health of various models against sglang (TP=4)"
deployment: "inference-scheduling-sglang"
serving_engine: "sglang"
# does not require model cache
deployment_template: "inference-scheduling-sglang-dummy-kustomization.yaml.tmpl"

# Model-specific information:

parameters:
  model:
    type: categorical
    values:
      - "Qwen/Qwen3-32B"
      - "deepseek-ai/DeepSeek-R1-0528"
      - "moonshotai/Kimi-K2.5"
      - "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      - "openai/gpt-oss-120b"
      # MXFP4 not yet supported
      #- "amd/Kimi-K2.5-MXFP4"
      #- "amd/DeepSeek-R1-0528-MXFP4"
      #- "amd/gpt-oss-120b-w-mxfp4-a-fp8"
  replicas:
    type: categorical
    values: [1]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed
    value: 100
  tensor_parallel_size:
    type: categorical
    values: [8]

  sglang_args:
    type: combinations
    args:
      load-format: "dummy"
      attention-backend: "aiter"
      trust-remote-code: true # for kimi
      max_running_requests: 1024
      mem_fraction_static: 0.90
      # SGLang's prefix caching via FlashInfer
      enable_flashinfer: true
      # Longest Prefix Match scheduling
      chunked_prefill_size: 4096
      schedule_policy: "lpm"

  model_specific_args:
    - pattern: "deepseek-ai/DeepSeek-R1-0528"
      sglang_args:
        kv-cache-dtype: "fp8_e4m3"
    - pattern: "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      sglang_args:
        kv-cache-dtype: "fp8_e4m3"
    - pattern: "moonshotai/Kimi-K2.5"
      sglang_args:
        kv-cache-dtype: "fp8_e4m3"
        enable-flashinfer: true

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  workload_file: "small_multi_turn.json"
  benchmark_args:
    num_clients: 5
    max_active_conversations: 5
    verbose: false