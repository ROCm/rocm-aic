name: "test-model-vllm-sweep"
description: "Test health of various models against vllm (TP=4)"
deployment: "inference-scheduling-vllm"
# does not require model cache
deployment_template: "inference-scheduling-vllm-dummy-kustomization.yaml.tmpl"

env_vars:
  VLLM_ROCM_USE_AITER: 1
# TODO does this work if there's also huggginface?
  HF_HOME: "/root/hf"

parameters:
  image:
    type: categorical
    values:
      - "ghcr.io/vcave/vllm:rocm_721-vllm_0201-lmcache_20260514_384d79df"
  model:
    type: categorical
    values:
      - "Qwen/Qwen3-32B"
      - "deepseek-ai/DeepSeek-R1-0528"
      - "moonshotai/Kimi-K2.5"
      - "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      - "openai/gpt-oss-120b"
      # MXFP4 not yet supported
      #- "amd/Kimi-K2.5-MXFP4"
      #- "amd/DeepSeek-R1-0528-MXFP4"
      #- "amd/gpt-oss-120b-w-mxfp4-a-fp8"
  replicas:
    type: categorical
    values: [8]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed
    value: 100
  tensor_parallel_size:
    type: categorical
    values: [8]

  vllm_args:
    type: combinations
    args:
      load-format: "dummy"
      trust-remote-code: true # for kimi
      gpu_memory_utilization:
        values: [0.90]
      kv_cache_dtype: "fp8"

  model_specific_args:
    - pattern: "moonshotai/Kimi-K2.5"
      vllm_args:
        block_size: 64
        mm_encoder_tp_mode: "data"
        trust-remote-code: True

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  workload_file: "small_multi_turn.json"
  benchmark_args:
    num_clients: 5
    max_active_conversations: 5
    verbose: false