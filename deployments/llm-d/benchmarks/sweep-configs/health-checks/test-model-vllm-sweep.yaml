name: "test-model-vllm-sweep"
description: "Test health of various models against vllm (TP=4)"
deployment: "inference-scheduling-vllm"

parameters:
  model:
    type: categorical
    values:
      - "Qwen/Qwen3-32B"
      - "amd/DeepSeek-R1-0528-MXFP4"
      - "amd/Kimi-K2.5-MXFP4"
      - "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      - "amd/gpt-oss-120b-w-mxfp4-a-fp8"
      - "openai/gpt-oss-120b"

# Need at least TP=4 for large models
  tensor_parallel_size:
    type: fixed
    value: 4
  vllm_args:
    type: combinations
    args:
      trust-remote-code: true # for kimi
      gpu_memory_utilization:
        values: [0.90]

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  workload_file: "small_multi_turn.json"
  benchmark_args:
    num_clients: 5
    max_active_conversations: 5
    verbose: false