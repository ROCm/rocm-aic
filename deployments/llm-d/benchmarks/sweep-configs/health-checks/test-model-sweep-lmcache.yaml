name: "test-model-sweep-lmcache"
description: "Test health of various models against vllm+LMCache (TP=2)"
deployment: "tiered-prefix-cache-lmcache"

parameters:
  model:
    type: categorical
    values:
      - "Qwen/Qwen3-32B"
      - "amd/DeepSeek-R1-0528-MXFP4"
      - "amd/Kimi-K2.5-MXFP4"
      - "amd/Qwen3-235B-A22B-Thinking-2507_moe_w_mxfp4_a_mxfp4_kv_fp8"
      - "amd/gpt-oss-120b-w-mxfp4-a-fp8"
      - "openai/gpt-oss-120b"

  tensor_parallel_size:
    type: fixed
    value: 2
  vllm_args:
    type: combinations
    args:
      disable_uvicorn_access_log: true
      gpu_memory_utilization:
        values: [0.90]
      kv_connector:
        values:
          - type: "lmcache"
            role: "kv_both"

  lmcache_args:
    type: combinations
    args:
      chunk_size: 256
      save_decode_cache: True
      local_cpu: true
      max_local_cpu_size: 100.0
      local_disk: null
      remote_url: null

load_generation:
  tool: "multi-turn-benchmark"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  workload_file: "small_multi_turn.json"
  benchmark_args:
    num_clients: 5
    max_active_conversations: 5
    verbose: false