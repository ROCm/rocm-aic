# Example sweep configuration
# Tests different KV cache configurations with a single model

name: "example-cache-sweep"
description: "Compare different KV cache strategies"
deployment: "tiered-prefix-cache"

# Parameter space to explore
parameters:
  # Fixed model for this sweep
  model:
    type: fixed
    value: "Qwen/Qwen3-32B"

  # Fixed tensor parallelism
  tensor_parallel_size:
    type: fixed
    value: 2

  # Sweep over different vLLM configurations
  vllm_args:
    type: combinations
    args:
      # Fixed performance settings
      max_num_seq:
        values: [512]

      gpu_memory_utilization:
        values: [0.90]

      # Sweep KV connector configurations
      kv_connector:
        values:
          # 1. No caching (baseline)
          - null

          # 2. CPU offloading with 50GB
          - type: "offloading"
            cpu_bytes: 53687091200
            role: "kv_both"

          # 3. CPU offloading with 100GB
          - type: "offloading"
            cpu_bytes: 107374182400
            role: "kv_both"

# Load generation configuration
load_generation:
  tool: "multi-turn-benchmark"

  # Docker image with benchmark code
  image: "vllm/vllm-openai:latest"

  # Workload file (mounted via ConfigMap)
  workload_file: "agent_multi_turn.json"

  # Benchmark arguments (passed to benchmark script in container)
  # Note: input_file is auto-added pointing to /workload/{workload_file}
  benchmark_args:
    num_clients: 100
    max_active_conversations: 100
    verbose: false

# This creates: 3 KV configurations = 3 runs
