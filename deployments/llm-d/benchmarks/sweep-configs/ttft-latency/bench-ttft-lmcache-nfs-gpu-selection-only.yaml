name: "ttft-lmcache-nvmeof-only-test"
description: "Test a tiered-prefix-cache-lmcache single run with NVMe-of"
deployment: "tiered-prefix-cache-lmcache"
deployment_template: "tiered-prefix-cache-lmcache-hipfile-gpu-selection-kustomization.yaml.tmpl"

env_vars:
  HF_HOME: "/root/hf_home_dummy"  #TODO
  HUGGINGFACE_HUB_CACHE: "/root/hf_hub_dummy"
  HIPFILE_STATS_LEVEL: "0"
  LMCACHE_INTERNAL_API_SERVER_ENABLED: "true"
  LMCACHE_INTERNAL_API_SERVER_PORT_START: "6990"
  MIOPEN_USER_DB_PATH: "/app/miopen"
  MIOPEN_FIND_MODE: "FAST"
  AMDGCN_USE_BUFFER_OPS: "0"
  LMCACHE_LOG_LEVEL: "INFO"

parameters:
  image:
    type: categorical
    values:
      - "ghcr.io/vcave/vllm:rocm_721-vllm_0190-lmcache_20260514_92fe433a"
  model:
    type: fixed
    value: "openai/gpt-oss-120b"
  replicas:
    type: categorical
    values: [1]
  memory:
    type: fixed
    value: "1500Gi"
  cpu:
    type: fixed # 112 available
    value: "100"

  gpu_reservation_count:
    type: fixed
    value: "8"

  gpu_visible_ids:
    type: categorical
    values: ["0", "4", "5"]

  tensor_parallel_size:
    type: categorical
    values: [1] # should match gpu visible id count

  vllm_args:
    type: combinations
    args:
      load-format: "dummy" #TODO
      disable_uvicorn_access_log: true
      no_enable_prefix_caching: true # disable GPU prefix caching
      gpu_memory_utilization: 0.80
      kv_connector:
        values:
          - type: "lmcache"
            role: "kv_both"

  lmcache_args:
    type: combinations
    args:
      chunk_size: 256
      save_decode_cache: false
      local_cpu: false
      use_gds: true
      gds_backend: "hipfile"
      # This path must agree with the pod's requested volumes
      gds_path: "/hipfile-of"
      gds_buffer_size: 16384
      extra_config:
        gds_io_threads:
          values: [16]

load_generation:
  tool: "vllm-bench-serve"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  # Run benchmark twice: first run populates the cache, second run cache hits.
  clone_run: true
  benchmark_args:
    type: combinations
    combination_mode: pairwise
    args:
      dataset_name: random 
      # Note: When tweaking settings, make sure the cache size is large enough
      random_input_len:
        values: [256, 512, 1024, 2048, 4096, 8192, 16384, 32768, 65536, 128000]
      random_output_len: 1
      max_concurrency: 1
      num_prompts:
        values: [300, 300, 200, 200, 100, 50, 30, 30, 30, 17]
      ignore_eos: true
      # seed is auto-generated