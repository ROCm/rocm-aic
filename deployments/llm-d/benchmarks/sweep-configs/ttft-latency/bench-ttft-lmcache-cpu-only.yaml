name: "ttft-lmcache-cpu-only"
description: "Test a tiered-prefix-cache-lmcache single run with CPU"
deployment: "tiered-prefix-cache-lmcache"
# uses hipfile template but 'lmcache_args' overrides to cpu (avoids config proliferation)
deployment_template: "tiered-prefix-cache-lmcache-hipfile-kustomization.yaml.tmpl"

parameters:
  model:
    type: fixed
    value: "openai/gpt-oss-120b"
  tensor_parallel_size:
    type: categorical
    values: [1,2,4,8]
  vllm_args:
    type: combinations
    args:
      disable_uvicorn_access_log: true
      no_enable_prefix_caching: true # disable GPU prefix caching
      gpu_memory_utilization:
        values: [0.90]
      kv_connector:
        values:
          - type: "lmcache"
            role: "kv_both"
  lmcache_args:
    type: combinations
    args:
      chunk_size: 256
      save_decode_cache: True
      local_cpu: true
      # This (* TP size) must agree with the pod's requested memory
      max_local_cpu_size: 300.0
      local_disk: null
      remote_url: null

load_generation:
  tool: "vllm-bench-serve"
  image: "ghcr.io/vcave/vllm:rocm_721-vllm_20260423b-lmcache"
  # Run benchmark twice: first run populates the CPU cache, second run cache hits.
  clone_run: true
  benchmark_args:
    type: combinations
    args:
      dataset_name: random 
      # Note: When tweaking settings, make sure the CPU cache size is large enough
      random_input_len:
        values: [1000, 2000, 4000, 10000, 20000, 40000, 80000, 128000]
      random_output_len: 1
      max_concurrency: 1
      num_prompts: 30
      ignore_eos: true
      # seed is auto-generated