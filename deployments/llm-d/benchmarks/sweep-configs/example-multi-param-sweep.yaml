# Example multi-parameter sweep configuration
# Demonstrates sweeping across multiple vLLM parameters

name: "example-multi-param-sweep"
description: "Sweep across memory utilization and KV cache configurations"
deployment: "tiered-prefix-cache"

parameters:
  model:
    type: fixed
    value: "Qwen/Qwen3-32B"

  tensor_parallel_size:
    type: fixed
    value: 2

  # Sweep multiple vLLM parameters
  vllm_args:
    type: combinations
    args:
      # Sweep max sequence length
      max_num_seq:
        values: [512, 1024]

      # Sweep GPU memory utilization
      gpu_memory_utilization:
        values: [0.85, 0.95]

      # Sweep KV connector
      kv_connector:
        values:
          - null  # Baseline
          - type: "offloading"
            cpu_bytes: 107374182400  # 100GB

# Load generation (same for all configs)
load_generation:
  tool: "multi-turn-benchmark"

  # Docker image with benchmark code
  image: "vllm/vllm-openai:latest"

  # Workload file (mounted via ConfigMap)
  workload_file: "agent_multi_turn.json"

  # Benchmark arguments
  benchmark_args:
    num_clients: 100
    max_active_conversations: 100
    verbose: false

# This creates: 2 (max_num_seq) × 2 (gpu_mem) × 2 (kv_connector) = 8 configurations
