---
# AMD-Oracle Weka cluster inventory.
#
# amd-arad  up infinite 1 down* useocpm2m-097-021
# amd-arad  up infinite 7 idle useocpm2m-097-[...]

all:
  children:

    weka_servers:
      hosts:
        weka-server-vm-1:
          ansible_host: snoc-think
          ansible_port: 2230
        weka-server-vm-2:
          ansible_host: snoc-think
          ansible_port: 2231
    weka_clients:
      hosts:
        weka-client-1:
          ansible_host: useocpm2m-097-113

  vars:
    ansible_user: stebates
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: >-
      -o RequestTTY=no
      -o RemoteCommand=none
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
    weka_cluster_tar_path: >-
      /tmp/weka-5.1.0.547.tar
    weka_cluster_use_loop_devices: false
    weka_cluster_force_install: false
    weka_cluster_wipe_drives: true
    weka_cluster_container_prefix: stebates-weka-poc
    weka_cluster_fs_group: "stebates-weka-poc-fs"
    weka_cluster_fs_name: "stebates-weka-poc-fs"
