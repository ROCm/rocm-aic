---
# Set up Weka containers on server nodes.
# Translates the logic from scripts/fast1server.sh.

- name: Build ordered list of all server hosts
  ansible.builtin.set_fact:
    weka_cluster_all_server_hosts: >-
      {{ (groups['weka_servers'] | default([]))
         + (groups['weka_both'] | default([])) }}

- name: Compute global container offset for host
  ansible.builtin.set_fact:
    weka_cluster_host_index: >-
      {{ weka_cluster_all_server_hosts.index(
           inventory_hostname) }}

- name: Compute failure-domain base
  ansible.builtin.set_fact:
    weka_cluster_fd_base: >-
      {{ (weka_cluster_host_index | int)
         * (weka_cluster_num_containers | int) }}

# ── Tear down existing containers ────────────────

- name: Stop existing Weka containers
  ansible.builtin.command:
    cmd: weka local stop -f
  become: true
  changed_when: true
  failed_when: false

- name: Remove existing Weka containers
  ansible.builtin.command:
    cmd: weka local rm --all --force
  become: true
  changed_when: true
  failed_when: false

# ── Resolve NIC to --net argument ────────────────

- name: Resolve NIC for container networking
  ansible.builtin.shell: |
    set -eo pipefail
    NIC="{{ weka_cluster_nic }}"
    if [ "$NIC" = "udp" ]; then
      echo "udp"
    elif echo "$NIC" \
         | grep -qE '^[0-9a-fA-F]{4}:'; then
      echo "$NIC"
    else
      pci=$(
        ethtool -i "$NIC" 2>/dev/null \
          | awk '/bus-info:/{print $2}'
      )
      if [ -z "$pci" ]; then
        echo "ERROR: cannot resolve PCI" \
             "for $NIC" >&2
        exit 1
      fi
      echo "$pci"
    fi
  args:
    executable: /bin/bash
  register: weka_cluster_net_arg_raw
  changed_when: false

- name: Store resolved net argument
  ansible.builtin.set_fact:
    weka_cluster_net_arg: >-
      {{ weka_cluster_net_arg_raw.stdout | trim }}

# ── Compute core/role splits ─────────────────────

- name: Compute role allocation per container
  ansible.builtin.set_fact:
    weka_cluster_p_drive: 1
    weka_cluster_p_remaining: >-
      {{ (weka_cluster_nic_queues | int) - 1 }}

- name: Compute primary frontend and compute cores
  ansible.builtin.set_fact:
    weka_cluster_p_frontend: >-
      {%- if (weka_cluster_p_remaining | int)
            >= 2 -%}
        {{ (weka_cluster_p_remaining | int)
           // 2 }}
      {%- elif (weka_cluster_p_remaining | int)
            == 1 -%}
        1
      {%- else -%}
        0
      {%- endif -%}
    weka_cluster_p_compute: >-
      {%- if (weka_cluster_p_remaining | int)
            >= 2 -%}
        {{ (weka_cluster_p_remaining | int)
           - ((weka_cluster_p_remaining | int)
              // 2) }}
      {%- else -%}
        0
      {%- endif -%}

- name: Compute secondary role allocation
  ansible.builtin.set_fact:
    weka_cluster_s_drive: 1
    weka_cluster_s_compute: >-
      {{ (weka_cluster_nic_queues | int) - 1 }}

- name: Log container layout
  ansible.builtin.debug:
    msg: |
      Host       : {{ inventory_hostname }}
      Net        : {{ weka_cluster_net_arg }}
      Queues     : {{ weka_cluster_nic_queues }}
      Primary    : {{ weka_cluster_nic_queues }}
                   cores
                   ({{ weka_cluster_p_drive }} drv,
                    {{ weka_cluster_p_compute
                       | trim }} cmp,
                    {{ weka_cluster_p_frontend
                       | trim }} fe)
      Secondary  : {{ weka_cluster_nic_queues }}
                   cores
                   ({{ weka_cluster_s_drive }} drv,
                    {{ weka_cluster_s_compute
                       | trim }} cmp)

# ── Create primary container ─────────────────────

- name: Build primary core-id list
  ansible.builtin.set_fact:
    weka_cluster_primary_core_ids: >-
      {{ range(1,
         (weka_cluster_nic_queues | int) + 1)
         | join(',') }}

- name: Determine primary frontend flags
  ansible.builtin.set_fact:
    weka_cluster_fe_flags: >-
      {%- if (weka_cluster_p_frontend | int)
            > 0 -%}
        --frontend-dedicated-cores
        {{ weka_cluster_p_frontend | trim }}
      {%- else -%}
        --no-frontends
      {%- endif -%}

- name: Create primary container
  ansible.builtin.shell: |
    set -eo pipefail
    weka local setup container \
      --name default \
      --net "{{ weka_cluster_net_arg }}" \
      --cores {{ weka_cluster_nic_queues }} \
      --cores-ids \
        "{{ weka_cluster_primary_core_ids }}" \
      --drives-dedicated-cores \
        {{ weka_cluster_p_drive }} \
      --compute-dedicated-cores \
        {{ weka_cluster_p_compute | trim }} \
      {{ weka_cluster_fe_flags | trim }} \
      --memory "{{ weka_cluster_primary_mem }}" \
      --failure-domain \
        "fd{{ (weka_cluster_fd_base | int) + 1 }}"
  args:
    executable: /bin/bash
  become: true
  changed_when: true

# ── Create secondary containers ──────────────────

- name: Create secondary containers
  ansible.builtin.shell: |
    {% set q = weka_cluster_nic_queues | int %}
    {% set start = 1 + (item | int) * q %}
    {% set ids = range(start, start + q)
                 | join(',') %}
    {% set port = 14000 + (item | int) * 1000 %}
    {% set fd = (weka_cluster_fd_base | int)
                + (item | int) + 1 %}
    {% set cmp = weka_cluster_s_compute | int %}
    set -eo pipefail
    weka local setup container \
      --name "default{{ item }}" \
      --net "{{ weka_cluster_net_arg }}" \
      --cores {{ q }} \
      --cores-ids "{{ ids }}" \
      --drives-dedicated-cores \
        {{ weka_cluster_s_drive }} \
      {% if cmp > 0 %}
      --compute-dedicated-cores {{ cmp }} \
      {% endif %}
      --no-frontends \
      --base-port {{ port }} \
      --memory \
        "{{ weka_cluster_secondary_mem }}" \
      --failure-domain "fd{{ fd }}"
  args:
    executable: /bin/bash
  become: true
  loop: >-
    {{ range(1,
       weka_cluster_num_containers | int)
       | list }}
  changed_when: true

# ── Wait for all containers to be Running ────────

- name: Wait for containers to reach Running state
  ansible.builtin.shell: |
    set -o pipefail
    running=$(
      weka local ps 2>/dev/null \
        | grep -c Running || echo 0
    )
    [ "$running" -ge \
      {{ weka_cluster_num_containers }} ]
  args:
    executable: /bin/bash
  become: true
  register: weka_cluster_containers_up
  retries: >-
    {{ weka_cluster_container_wait_retries }}
  delay: "{{ weka_cluster_container_wait_delay }}"
  until: weka_cluster_containers_up.rc == 0
  changed_when: false

- name: Confirm containers are running
  ansible.builtin.debug:
    msg: >-
      All {{ weka_cluster_num_containers }}
      containers are running on
      {{ inventory_hostname }}
