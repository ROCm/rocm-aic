---
# Extract the Weka install tar from the shared NFS
# mount into /tmp on the target node and run the
# bundled install.sh.
#
# The tar contains a top-level directory named
# weka-<version>/ so we extract directly into /tmp,
# giving /tmp/weka-<version>/install.sh.
#
# Skipped when the target version is already
# installed (detected during preflight).

- name: Determine if install is needed
  ansible.builtin.set_fact:
    weka_cluster_install_needed: >-
      {{ (weka_cluster_installed_version | trim)
         != weka_cluster_version }}

- name: Skip install (version already current)
  ansible.builtin.debug:
    msg: >-
      Weka {{ weka_cluster_version }} is already
      installed on {{ inventory_hostname }},
      skipping install.
  when: not (weka_cluster_install_needed | bool)

- name: Extract Weka tar to /tmp
  ansible.builtin.unarchive:
    src: "{{ weka_cluster_tar_path }}"
    dest: /tmp
    remote_src: true
    creates: >-
      /tmp/weka-{{ weka_cluster_version
      }}/install.sh
  when:
    - weka_cluster_install_needed | bool
    - not ansible_check_mode

- name: Run Weka install.sh
  ansible.builtin.command:
    cmd: bash install.sh
    chdir: "/tmp/weka-{{ weka_cluster_version }}"
  become: true
  register: weka_cluster_install_result
  changed_when: >-
    'is now installed'
    in weka_cluster_install_result.stdout
  when:
    - weka_cluster_install_needed | bool
    - not ansible_check_mode

- name: Wait for weka version current to succeed
  ansible.builtin.command:
    cmd: weka version current
  register: weka_cluster_ver
  retries: 10
  delay: 3
  until: weka_cluster_ver.rc == 0
  changed_when: false
  become: true
  when:
    - weka_cluster_install_needed | bool
    - not ansible_check_mode

- name: Display installed Weka version
  ansible.builtin.debug:
    msg: >-
      Weka {{ weka_cluster_ver.stdout
      | default(weka_cluster_installed_version)
      | default('(check mode)') | trim }}
      on {{ inventory_hostname }}
