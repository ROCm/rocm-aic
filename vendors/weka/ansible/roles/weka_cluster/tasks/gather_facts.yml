---
# Gather hardware facts on every host:
#   OS, kernel, CPU, memory, RDMA NICs, NVMe SSDs,
#   and the management IP used by Weka.

- name: Print basic system info
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }}:
      {{ ansible_distribution }}
      {{ ansible_distribution_version }},
      kernel {{ ansible_kernel }},
      {{ ansible_processor_vcpus }} vCPUs,
      {{ ansible_memtotal_mb }} MB RAM

- name: Detect RDMA network interfaces
  ansible.builtin.shell: |
    set -o pipefail
    for iface in $(
      ip -o link show \
        | awk -F': ' '{print $2}' \
        | grep '^rdma'
    ); do
      addr=$(
        ip -4 -o addr show "$iface" \
          | awk '{print $4}' \
          | cut -d/ -f1
      )
      pci=$(
        ethtool -i "$iface" 2>/dev/null \
          | awk '/bus-info:/{print $2}'
      )
      echo "${iface}|${addr}|${pci}"
    done
  args:
    executable: /bin/bash
  register: weka_cluster_rdma_raw
  changed_when: false
  failed_when: false
  check_mode: false

- name: Build RDMA NIC list
  ansible.builtin.set_fact:
    weka_cluster_rdma_nics: >-
      {{ weka_cluster_rdma_raw.stdout_lines
         | default([])
         | map('split', '|')
         | list }}

- name: Detect NVMe block devices
  ansible.builtin.shell: |
    set -o pipefail
    lsblk -d -n -o NAME,TYPE \
      | awk '$2=="disk" && $1 ~ /^nvme/ {
          print "/dev/" $1
        }'
  args:
    executable: /bin/bash
  register: weka_cluster_nvme_raw
  changed_when: false
  check_mode: false

- name: Set detected NVMe drives
  ansible.builtin.set_fact:
    weka_cluster_detected_nvme: >-
      {{ weka_cluster_nvme_raw.stdout_lines
         | default([]) }}

- name: Use explicit drives or fall back to detected
  ansible.builtin.set_fact:
    weka_cluster_active_nvme: >-
      {{ weka_cluster_nvme_drives
         if (weka_cluster_nvme_drives | length > 0)
         else weka_cluster_detected_nvme }}

- name: Detect management IP
  ansible.builtin.shell: |
    set -o pipefail
    ip -4 route get 1.1.1.1 \
      | awk '{for(i=1;i<=NF;i++)
                if($i=="src"){print $(i+1);exit}}'
  args:
    executable: /bin/bash
  register: weka_cluster_mgmt_ip_raw
  changed_when: false
  check_mode: false

- name: Store management IP
  ansible.builtin.set_fact:
    weka_cluster_mgmt_ip: >-
      {{ weka_cluster_mgmt_ip_raw.stdout | trim }}

- name: Summarise gathered facts
  ansible.builtin.debug:
    msg: |
      Management IP : {{ weka_cluster_mgmt_ip }}
      RDMA NICs     : {{ weka_cluster_rdma_nics
                         | length }}
      {% for nic in weka_cluster_rdma_nics %}
        {{ nic[0] }} : {{ nic[1] }}  ({{ nic[2] }})
      {% endfor %}
      NVMe drives   : {{ weka_cluster_active_nvme
                         | join(', ')
                         | default('none') }}
