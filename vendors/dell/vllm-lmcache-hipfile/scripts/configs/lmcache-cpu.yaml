# --- LMCache Configuration for Local CPU ---

# The number of tokens in each cache chunk.
# 256 is the standard for balancing granularity
# and performance.
chunk_size: 256

save_decode_cache: True

# Enable caching in the host's CPU RAM
local_cpu: true

# The maximum amount of CPU RAM (in GB) to allocate for the
# KV cache. Adjust based on available system memory.
max_local_cpu_size: 100.0  # 100GB buffer in RAM

# Optional: Enable disk caching if you want the cache to
# persist across vLLM restarts or if CPU RAM fills up.
local_disk: null

# Remote storage (set to null for local-only caching)
remote_url: null
