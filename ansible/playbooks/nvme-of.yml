#
# One NVMe-oF target plus initiators using sbates130272.batesste.nvmeof_setup.
#
# Before first apply:
#   ansible-playbook playbooks/discover.yml
# Inspect RoCE/storage IPv4 and interface names on nvmeof_target and set
# nvmeof_setup_target_interface (preferred) or nvmeof_setup_target_ip in
# inventory/group_vars/nvmeof_target.yml. Align nvmeof_setup_subsystems
# device_path with a real block device on the target, or enable
# nvmeof_target_lvm (role nvmeof_target_lvm) to build one linear LV from
# multiple NVMe devices before nvmet exports it. Role nvmeof_target_disk_guard
# runs first and fails if any backing disk has a mount, fstype, swap, or LVM PV.
#
# Run (from ansible/):
#   ansible-playbook playbooks/nvme-of.yml
# Or via site:
#   ansible-playbook site.yml --tags nvmeof
#
# Order: target play must run before host play so hostvars contain
# nvmeof_setup_target_ip_resolved on the target inventory hostname.

- name: Configure NVMe-oF target (nvmet over RDMA)
  hosts: nvmeof_target
  gather_facts: true
  become: true
  tags:
    - nvmeof
  roles:
    - role: nvmeof_target_disk_guard
      tags:
        - nvmeof
        - nvmeof-disk-guard
    - role: nvmeof_target_lvm
      tags:
        - nvmeof
        - nvmeof-lvm
    - role: sbates130272.batesste.nvmeof_setup
      tags:
        - nvmeof
        - nvmeof-target

- name: Connect NVMe-oF initiators to the target
  hosts: nvmeof_hosts
  gather_facts: true
  become: true
  tags:
    - nvmeof
  roles:
    - role: sbates130272.batesste.nvmeof_setup
