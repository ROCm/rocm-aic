---
# RDMA / fabric connectivity checks (ICMP and optional perftest matrix)
#
# Default matrix_mode is ICMP ping between every host pair (directed or
# undirected). Perftest modes exercise RDMA CM using IPv4 on discovered
# netdevs (rdma link show, etc.). Management ansible_host is the default
# ping target; fabric perftest uses NIC / rdma_network_bind_ipv4.
#
# Run from ansible/:
#   ansible-playbook -i inventory/hosts.yml playbooks/rdma-network.yml
#
# When pulled in via site.yml, this play is tagged rdma-network and runs by
# default; skip with: ansible-playbook site.yml --skip-tags rdma-network
#
# Variables (override with -e, group_vars, or host_vars):
#
#   rdma_network_group
#       Inventory group to test (default: gpu_nodes). Also used as this
#       play's hosts: pattern unless you edit the play below.
#
#   rdma_network_hosts
#       Optional explicit list of inventory names. When empty, members of
#       rdma_network_group are used.
#
#   rdma_network_matrix_mode
#       full_ping (default): for each host pair, ICMP from every RDMA NIC
#       address on the server to every RDMA NIC address on the client, using
#       ping -I <src_ip> so packets use the fabric path. RDMA discovery runs
#       to populate netdev IPv4s. pair_mode sets which host pairs are tested.
#       full_perftest: every local NIC × every remote NIC per host pair.
#       pair_pingpong: one latency test per host pair (first usable NIC each
#       side); uses rdma_network_pair_pingpong_perftest (default ib_send_lat).
#
#   rdma_network_ping_target / rdma_network_ping_count /
#   rdma_network_ping_deadline_sec
#       For full_ping: fabric (default) pings the first discovered RDMA
#       netdev IPv4 on the peer (or bind_ipv4); management pings ansible_host
#       only if you set ping_target=management explicitly.
#       rdma_network_ping_deadline_sec maps to iputils ping -w (wall limit).
#       rdma_network_ping_async_slack_sec is added for Ansible async only.
#
#   rdma_network_device
#       Optional filter: keep only this CA name (RDMA device) from discovery.
#       Discovery prefers "rdma link show", then "rdma dev show", then sysfs.
#
#   rdma_network_skip_nics_without_ip
#       When true (default), omit NIC rows with no resolvable IPv4 before
#       building the perftest mesh.
#
#   rdma_network_json_summary
#       When true (default), write rdma-mesh-summary.json next to the text
#       report (host pairs, icmp_pings, perftest links when run).
#
#   rdma_network_json_stdout_max
#       Max characters of perftest stdout stored per link (0 = omit excerpt).
#
#   rdma_network_bind_ipv4
#       Per host: fabric IPv4 for perftest -s / destination; also fabric ping.
#
#   rdma_network_bind_interface
#       Optional: one interface name on every host; IPv4 from gathered facts
#       ansible_<iface>.ipv4 when rdma_network_bind_ipv4 is unset.
#
#   rdma_network_gid_index
#       Optional GID index passed as -x to perftest (RoCE).
#
#   rdma_network_roce
#       When true (default), pass -R to perftest.
#
#   rdma_network_perftest
#       Binary for full_perftest mode (default: ib_write_bw).
#
#   rdma_network_perftest_extra_args
#       Extra CLI for full_perftest (default: "-n 5000 -m 4096").
#
#   rdma_network_pair_pingpong_perftest / rdma_network_pair_pingpong_extra_args
#       Used when matrix_mode=pair_pingpong (defaults: ib_send_lat, -n 2048).
#
#   rdma_network_pair_mode
#       directed (default) or undirected.
#
#   rdma_network_server_start_delay / rdma_network_async_timeout
#       Timing for async perftest server and client async ceiling
#       (async_timeout + rdma_network_client_async_slack_sec).
#
#   rdma_network_write_report
#       When true, write ansible/reports/<ts>/rdma-perftest.txt on controller.
#
#   rdma_network_print_connection_summary
#       When true (default), print ASCII PASS/FAIL tables for ICMP and/or
#       perftest links at the end of the role (ansible debug stdout).
#
#   rdma_network_random_subset_count / rdma_network_random_subset_seed
#       When sample_size > 0, after building the full mesh each of the ICMP
#       plan (full_ping) and perftest plan (full_perftest / pair_pingpong) is
#       shuffled and truncated to at most that many rows (independently). Use
#       seed (integer) for a reproducible draw; leave seed empty for a new
#       random sample each run. 0 = run the full mesh (default).

- name: RDMA network connectivity (ICMP and optional perftest)
  hosts: "{{ rdma_network_group | default('gpu_nodes') }}"
  gather_facts: true
  tags:
    - rdma-network
  tasks:
    - name: Run rdma_network checks
      ansible.builtin.include_role:
        name: rdma_network
      run_once: true
