---
# Prometheus + Grafana on `monitoring_server`, scraping `gpu_nodes` exporters.
#
# Run from ansible/:
#   ansible-playbook -i inventory/hosts.yml site.yml --tags monitoring
# Skip with:
#   ansible-playbook site.yml --skip-tags monitoring
#
# Variables: see inventory/group_vars/monitoring_server.yml and role
# ansible/roles/monitoring_stack/defaults/main.yml.
#
# Exporter installs (node-exporter package, nvme_exporter_setup, rdma_exporter
# via rdma_setup, AMD metrics via rocm_setup) are applied by the provision play
# (host_setup on gpu_nodes).
#
# Grafana: cluster summary dashboard UID rocm-aic-cluster (recording rules
# rocm_icms:nvme:key / rocm_icms:rdma:key; textfile rocm_icms_software_version).
#
# Prometheus on monitoring_server: scrape-only config in prometheus.yml; remote
# write receiver enabled via /etc/default/prometheus (POST /api/v1/write).

- name: Install monitoring stack on monitoring server
  hosts: monitoring_server
  gather_facts: true
  become: true
  tags:
    - monitoring
  roles:
    - monitoring_stack

- name: Ensure prometheus-node-exporter is active on GPU nodes
  hosts: gpu_nodes
  gather_facts: false
  become: true
  tags:
    - monitoring
  tasks:
    - name: Enable and start prometheus-node-exporter
      ansible.builtin.service:
        name: prometheus-node-exporter
        state: started
        enabled: true
      when: "'prometheus-node-exporter' in (extra_packages | default([]))"
