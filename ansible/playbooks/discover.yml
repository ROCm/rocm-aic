#
# Use gathered facts (interfaces, IPv4) to set nvmeof_setup_target_interface or
# fabric IPs in inventory/group_vars/nvmeof_target.yml before playbooks/nvme-of.yml.

---
- name: Discover host hardware and software configuration
  hosts: gpu_nodes
  gather_facts: true
  become: true
  pre_tasks:
    - name: Record play start timestamp
      ansible.builtin.set_fact:
        play_timestamp: >-
          {{ ansible_date_time.iso8601_basic_short }}
      run_once: true
  roles:
    - host_discovery

- name: Compare hosts and report differences
  hosts: gpu_nodes
  gather_facts: false
  become: false
  tasks:
    - name: Load cross-host comparison role
      ansible.builtin.include_role:
        name: host_discovery
        tasks_from: diff.yml
      run_once: true
