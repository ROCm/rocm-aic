#
# Install kv-cache-tester on hosts in group kv_cache_tester and run a probe
# against kv_cache_tester_api_endpoint (OpenAI-compatible HTTP API). Upstream:
# https://github.com/callanjfox/kv-cache-tester
#
# Run from ansible/:
#   ansible-playbook playbooks/kv-cache-tester.yml
#   ansible-playbook playbooks/kv-cache-tester.yml -e kv_cache_tester_api_endpoint=http://10.245.130.131:8000
# Install only (no benchmark run):
#   ansible-playbook playbooks/kv-cache-tester.yml -e kv_cache_tester_run=false
# Or via site.yml:
#   ansible-playbook site.yml --tags kv-cache-tester
#
# Variables: roles/kv_cache_tester/defaults/main.yml and
# inventory/group_vars/kv_cache_tester.yml.

- name: Install and run kv-cache-tester
  hosts: kv_cache_tester
  gather_facts: true
  become: false
  tags:
    - kv-cache-tester
  roles:
    - kv_cache_tester
