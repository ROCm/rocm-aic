---
# Run from ansible/: ansible-playbook playbooks/site.yml
# Examples:
#   ansible-playbook playbooks/site.yml --tags discover
#   ansible-playbook playbooks/site.yml --tags provision
#   ansible-playbook playbooks/site.yml --tags rocm
#   ansible-playbook playbooks/site.yml --list-tags

- name: Import discovery plays
  ansible.builtin.import_playbook: discover.yml
  tags:
    - discover
    - site

- name: Import provisioning plays
  ansible.builtin.import_playbook: provision.yml
  tags:
    - provision
    - site
