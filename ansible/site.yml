---
# Run from ansible/: ansible-playbook site.yml
# Examples:
#   ansible-playbook site.yml --tags discover
#   ansible-playbook site.yml --tags provision
#   ansible-playbook site.yml --skip-tags rdma-network
#   ansible-playbook site.yml --skip-tags monitoring
#   ansible-playbook site.yml --tags inference-container
#   ansible-playbook site.yml --tags kv-cache-tester
#   ansible-playbook site.yml --tags nvmeof
#   ansible-playbook site.yml --tags monitoring

- name: Discover the state of the GPU cluster nodes
  ansible.builtin.import_playbook: playbooks/discover.yml
  tags:
    - discover

- name: Provision the GPU cluster nodes
  hosts: gpu_nodes
  gather_facts: true
  become: true
  roles:
    - host_setup
  tags:
    - provision

- name: Perform RDMA network connectivity and (optional) perftest checks
  ansible.builtin.import_playbook: playbooks/rdma-network.yml
  tags:
    - rdma-network

- name: Build or deploy ROCm inference stack container image
  ansible.builtin.import_playbook: playbooks/inference-image.yml
  tags:
    - inference-container

- name: Install and run kv-cache-tester against an inference HTTP endpoint
  ansible.builtin.import_playbook: playbooks/kv-cache-tester.yml
  tags:
    - kv-cache-tester

- name: Configure NVMe-oF target and initiators (RDMA)
  ansible.builtin.import_playbook: playbooks/nvme-of.yml
  tags:
    - nvmeof

- name: Install Prometheus, Grafana, and monitoring scrape configuration
  ansible.builtin.import_playbook: playbooks/monitoring.yml
  tags:
    - monitoring
