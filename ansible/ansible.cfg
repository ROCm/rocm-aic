[defaults]
roles_path = roles
inventory = inventory/hosts.yml
host_key_checking = False
gathering = smart
interpreter_python = auto_silent
# Readable multiline debug / command output (default is escaped JSON).
callback_result_format = yaml

[ssh_connection]
pipelining = True
