---
- name: >-
    Require bind IPs
    [{{ (rdma_matrix_index | default(0)) + 1 }}/{{ rdma_network_matrix_tests | length }}]
    {{ test.server }}:{{ test.server_device }}@{{ test.server_bind }}
    <- {{ test.client }}:{{ test.client_device }}@{{ test.client_bind }}
  ansible.builtin.assert:
    that:
      - test.server_bind | default('') | trim | length > 0
      - test.client_bind | default('') | trim | length > 0
    fail_msg: >-
      Missing IPv4 for RDMA NICs server={{ test.server }} dev={{ test.server_device }}
      client={{ test.client }} dev={{ test.client_device }} (assign IPs / facts).

- name: Check perftest on server ({{ test.server }})
  ansible.builtin.command:
    cmd: which {{ rdma_network_perftest_effective }}
  register: rdma_which_server
  changed_when: false
  delegate_to: "{{ test.server }}"

- name: Check perftest on client ({{ test.client }})
  ansible.builtin.command:
    cmd: which {{ rdma_network_perftest_effective }}
  register: rdma_which_client
  changed_when: false
  delegate_to: "{{ test.client }}"

- name: Assert perftest is installed on both endpoints
  ansible.builtin.assert:
    that:
      - rdma_which_server.rc == 0
      - rdma_which_client.rc == 0
    fail_msg: >-
      {{ rdma_network_perftest_effective }} not found on server={{ test.server }}
      (rc={{ rdma_which_server.rc | default('n/a') }})
      or client={{ test.client }} (rc={{ rdma_which_client.rc | default('n/a') }}).

- name: Build perftest common flag string
  ansible.builtin.set_fact:
    rdma_perftest_gid_flag: >-
      {{
        ('-x ' ~ (rdma_network_gid_index | string | trim))
        if (rdma_network_gid_index is not none)
          and (rdma_network_gid_index | string | trim | length > 0)
        else ''
      }}
    rdma_perftest_roce_flag: "{{ '-R' if rdma_network_roce | bool else '' }}"

- name: >-
    Start perftest server (async)
    {{ test.server }} -d {{ test.server_device }} -s {{ test.server_bind }}
  ansible.builtin.shell: >-
    {{ rdma_network_perftest_effective }}
    -d {{ test.server_device | quote }}
    -s {{ test.server_bind | quote }}
    {{ rdma_perftest_roce_flag }}
    {{ rdma_perftest_gid_flag }}
    {{ rdma_network_perftest_extra_effective | default('') }}
  args:
    executable: /bin/bash
  async: "{{ rdma_network_async_timeout | int }}"
  poll: 0
  register: rdma_server_async
  delegate_to: "{{ test.server }}"

- name: >-
    Pause after server start ({{ rdma_network_server_start_delay }}s)
    {{ test.server }} -> {{ test.client }}
  ansible.builtin.pause:
    seconds: "{{ rdma_network_server_start_delay | int }}"

- name: >-
    Run perftest client ({{ (rdma_matrix_index | default(0)) + 1 }}/{{ rdma_network_matrix_tests | length }})
    {{ test.client }} -> {{ test.server_bind }} (srv {{ test.server }})
  ansible.builtin.shell: >-
    {{ rdma_network_perftest_effective }}
    -d {{ test.client_device | quote }}
    -s {{ test.client_bind | quote }}
    {{ rdma_perftest_roce_flag }}
    {{ rdma_perftest_gid_flag }}
    {{ rdma_network_perftest_extra_effective | default('') }}
    {{ test.server_bind | quote }}
  args:
    executable: /bin/bash
  async: >-
    {{
      (rdma_network_async_timeout | int)
      + (rdma_network_client_async_slack_sec | default(10) | int)
    }}
  poll: 2
  register: rdma_client_result
  failed_when: false
  delegate_to: "{{ test.client }}"

- name: Stop perftest server when client exited with error
  ansible.builtin.shell: >-
    pkill -f {{ rdma_network_perftest_effective | quote }} || true
  args:
    executable: /bin/bash
  when: rdma_client_result.rc | default(1) != 0
  changed_when: false
  failed_when: false
  delegate_to: "{{ test.server }}"

- name: Wait for perftest server job to finish
  ansible.builtin.async_status:
    jid: "{{ rdma_server_async.ansible_job_id }}"
  register: rdma_server_done
  until: rdma_server_done.finished | default(false)
  retries: "{{ [(rdma_network_async_timeout | int // 2), 1] | max }}"
  delay: 2
  delegate_to: "{{ test.server }}"
  failed_when: false

- name: Find perftest BW table rows in client stdout
  when: rdma_network_json_summary | bool
  ansible.builtin.set_fact:
    rdma_bw_match_list: >-
      {{
        (rdma_client_result.stdout | default(''))
        | regex_findall('(?m)^\\s*\\d+\\s+\\d+\\s+([0-9.]+)\\s+([0-9.]+)\\s*$')
      }}

- name: Take last BW sample row (perftest summary line)
  when: rdma_network_json_summary | bool
  ansible.builtin.set_fact:
    rdma_bw_last: >-
      {{
        (rdma_bw_match_list | length > 0)
        | ternary(rdma_bw_match_list | last, [])
      }}

- name: Append this link to JSON summary list
  when: rdma_network_json_summary | bool
  ansible.builtin.set_fact:
    rdma_network_link_results: "{{ (rdma_network_link_results | default([])) + [rdma_link_json] }}"
  vars:
    rdma_lim: "{{ rdma_network_json_stdout_max | int }}"
    rdma_stdout_raw: "{{ rdma_client_result.stdout | default('') | string }}"
    rdma_stdout_saved: >-
      {{
        ''
        if (rdma_lim | int) <= 0
        else (rdma_stdout_raw[:(rdma_lim | int)])
      }}
    rdma_stderr_saved: "{{ (rdma_client_result.stderr | default(''))[:4000] }}"
    rdma_link_json:
      edge_id: >-
        {{ test.server }}|{{ test.server_device }}|{{ test.server_bind }}->{{
        test.client }}|{{ test.client_device }}|{{ test.client_bind }}
      server_inventory_hostname: "{{ test.server }}"
      server_rdma_device: "{{ test.server_device }}"
      server_netdev: "{{ test.server_netdev }}"
      server_ipv4: "{{ test.server_bind }}"
      client_inventory_hostname: "{{ test.client }}"
      client_rdma_device: "{{ test.client_device }}"
      client_netdev: "{{ test.client_netdev }}"
      client_ipv4: "{{ test.client_bind }}"
      client_exit_code: "{{ rdma_client_result.rc | default(-1) | int }}"
      server_async_finished: "{{ rdma_server_done.finished | default(false) }}"
      server_async_exit_code: "{{ rdma_server_done.rc | default(-1) | int }}"
      bandwidth_peak_gbps: >-
        {{ rdma_bw_last[0] if (rdma_bw_last | length) > 0 else '' }}
      bandwidth_average_gbps: >-
        {{ rdma_bw_last[1] if (rdma_bw_last | length) > 1 else '' }}
      perftest_parsed_bw_row: "{{ (rdma_bw_match_list | default([]) | length) > 0 }}"
      perftest_tool: "{{ rdma_network_perftest_effective }}"
      client_stdout_excerpt: "{{ rdma_stdout_saved }}"
      client_stderr_excerpt: "{{ rdma_stderr_saved }}"

- name: Show perftest result for device pair
  ansible.builtin.debug:
    msg: |
      RDMA perftest {{ rdma_network_perftest_effective }}
      {{ test.server }}:{{ test.server_device }}@{{ test.server_bind }} (server)
      <- {{ test.client }}:{{ test.client_device }}@{{ test.client_bind }} (client)
      client_rc={{ rdma_client_result.rc | default('n/a') }}
      ----- client stdout -----
      {{ rdma_client_result.stdout | default('') }}
      ----- client stderr -----
      {{ rdma_client_result.stderr | default('') }}

- name: Append result line to controller report
  when: rdma_network_write_report | bool
  ansible.builtin.lineinfile:
    path: "{{ rdma_network_report_path }}"
    mode: "0644"
    line: >-
      {{ rdma_network_report_ts }}
      server={{ test.server }} sdev={{ test.server_device }} sbind={{ test.server_bind }}
      client={{ test.client }} cdev={{ test.client_device }} cbind={{ test.client_bind }}
      client_rc={{ rdma_client_result.rc | default('n/a') }}
      server_finished={{ rdma_server_done.finished | default(false) }}
      server_rc={{ rdma_server_done.rc | default('n/a') }}
      OUT={{ (rdma_client_result.stdout | default(''))
        | replace('\n', ' ')
        | truncate(4000, True, '...') }}
  delegate_to: localhost
  vars:
    ansible_connection: local
