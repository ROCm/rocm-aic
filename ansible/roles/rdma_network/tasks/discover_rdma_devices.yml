---
- name: List RDMA link device and netdev on {{ rdma_discover_host }}
  ansible.builtin.shell: |
    set -o pipefail
    RDMA_OUT=""
    if command -v rdma >/dev/null 2>&1; then
      RDMA_OUT="$(
        rdma link show 2>/dev/null | awk '
          /^link / {
            dev = $2
            sub(/\/.*/, "", dev)
            nd = ""
            for (i = 1; i <= NF; i++) {
              if ($i == "netdev") {
                nd = $(i + 1)
                break
              }
            }
            if ((dev != "") && (nd != ""))
              print dev "|" nd
          }
        ' | sort -u || true
      )"
    fi
    if echo "$RDMA_OUT" | grep -q '[^[:space:]]'; then
      echo "$RDMA_OUT"
      exit 0
    fi
    if command -v rdma >/dev/null 2>&1; then
      RDMA_OUT="$(
        rdma dev show 2>/dev/null | awk '
          /^link / {
            dev = $2
            sub(/\/.*/, "", dev)
            nd = ""
            for (i = 1; i <= NF; i++) {
              if ($i == "netdev") {
                nd = $(i + 1)
                break
              }
            }
            if ((dev != "") && (nd != ""))
              print dev "|" nd
          }
          /^device / {
            print $2 "|"
          }
        ' | sort -u || true
      )"
    fi
    if echo "$RDMA_OUT" | grep -q '[^[:space:]]'; then
      echo "$RDMA_OUT"
      exit 0
    fi
    if [ -d /sys/class/infiniband ]; then
      for d in /sys/class/infiniband/*; do
        [ -e "$d" ] || continue
        echo "$(basename "$d")|"
      done
    fi
  args:
    executable: /bin/bash
  register: rdma_link_table
  changed_when: false
  failed_when: false
  delegate_to: "{{ rdma_discover_host }}"

- name: Reset NIC list on runner host ({{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: []
  when: rdma_discover_host == inventory_hostname

- name: Reset NIC list on delegated host ({{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: []
  when: rdma_discover_host != inventory_hostname
  delegate_to: "{{ rdma_discover_host }}"
  delegate_facts: true

- name: Append one RDMA NIC row on {{ rdma_discover_host }}
  ansible.builtin.include_tasks: append_rdma_nic_row.yml
  loop: "{{ rdma_link_table.stdout_lines | default([]) | map('trim') | select() | list }}"
  loop_control:
    label: "{{ item }}"

- name: Restrict to explicit rdma_network_device (runner {{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: >-
      {{
        rdma_network_rdma_nics
        | selectattr('device', 'equalto', rdma_explicit_filter)
        | list
      }}
  vars:
    rdma_explicit_filter: >-
      {{ hostvars[rdma_discover_host].rdma_network_device | default('', true) | trim }}
  when:
    - rdma_discover_host == inventory_hostname
    - rdma_explicit_filter | length > 0

- name: Restrict to explicit rdma_network_device (delegated {{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: >-
      {{
        hostvars[rdma_discover_host].rdma_network_rdma_nics
        | selectattr('device', 'equalto', rdma_explicit_filter)
        | list
      }}
  vars:
    rdma_explicit_filter: >-
      {{ hostvars[rdma_discover_host].rdma_network_device | default('', true) | trim }}
  when:
    - rdma_discover_host != inventory_hostname
    - rdma_explicit_filter | length > 0
    - hostvars[rdma_discover_host].rdma_network_rdma_nics is defined
  delegate_to: "{{ rdma_discover_host }}"
  delegate_facts: true

- name: Drop NICs without usable IPv4 (runner {{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: >-
      {{
        rdma_network_rdma_nics
        | rejectattr('ipv4', 'equalto', '')
        | list
      }}
  when:
    - rdma_discover_host == inventory_hostname
    - rdma_network_skip_nics_without_ip | bool

- name: Drop NICs without usable IPv4 (delegated {{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: >-
      {{
        hostvars[rdma_discover_host].rdma_network_rdma_nics
        | rejectattr('ipv4', 'equalto', '')
        | list
      }}
  when:
    - rdma_discover_host != inventory_hostname
    - hostvars[rdma_discover_host].rdma_network_rdma_nics is defined
    - rdma_network_skip_nics_without_ip | bool
  delegate_to: "{{ rdma_discover_host }}"
  delegate_facts: true

- name: Publish rdma_network_device_effective (runner {{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_device_effective: >-
      {{
        (rdma_network_rdma_nics | map(attribute='device') | list | join('+'))
        | default('', true)
      }}
  when: rdma_discover_host == inventory_hostname

- name: Publish rdma_network_device_effective (delegated {{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_device_effective: >-
      {{
        (hostvars[rdma_discover_host].rdma_network_rdma_nics | map(attribute='device') | list | join('+'))
        | default('', true)
      }}
  when:
    - rdma_discover_host != inventory_hostname
    - hostvars[rdma_discover_host].rdma_network_rdma_nics is defined
  delegate_to: "{{ rdma_discover_host }}"
  delegate_facts: true
