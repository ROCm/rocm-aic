---
# fabric: every RDMA NIC on pair.server to every RDMA NIC on pair.client
# (same shape as full_perftest device product). management: one row per pair
# to ansible_host without -I.

- name: Add fabric ICMP rows (NIC mesh) {{ pair.server }} -> {{ pair.client }}
  ansible.builtin.set_fact:
    rdma_network_ping_tests: "{{ rdma_network_ping_tests + [row] }}"
  loop: >-
    {{
      hostvars[pair.server].rdma_network_rdma_nics | default([])
      | product(hostvars[pair.client].rdma_network_rdma_nics | default([]))
      | list
    }}
  when:
    - (rdma_network_ping_target | default('fabric')) == 'fabric'
    - (item.0.ipv4 | default('') | trim | length) > 0
    - (item.1.ipv4 | default('') | trim | length) > 0
  vars:
    row:
      server: "{{ pair.server }}"
      client: "{{ pair.client }}"
      server_bind: "{{ item.0.ipv4 }}"
      client_bind: "{{ item.1.ipv4 }}"
      server_netdev: "{{ item.0.netdev }}"
      client_netdev: "{{ item.1.netdev }}"
      server_device: "{{ item.0.device }}"
      client_device: "{{ item.1.device }}"

- name: Add management ICMP row {{ pair.server }} -> {{ pair.client }}
  ansible.builtin.set_fact:
    rdma_network_ping_tests: "{{ rdma_network_ping_tests + [row] }}"
  when:
    - (rdma_network_ping_target | default('fabric')) == 'management'
    - (hostvars[pair.client].ansible_host | default('', true) | trim | length) > 0
  vars:
    row:
      server: "{{ pair.server }}"
      client: "{{ pair.client }}"
      server_bind: ""
      client_bind: "{{ hostvars[pair.client].ansible_host | default('', true) | trim }}"
      server_netdev: ""
      client_netdev: ""
      server_device: ""
      client_device: ""
