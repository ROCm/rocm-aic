---
- name: Accumulate directed RDMA test pairs
  ansible.builtin.set_fact:
    rdma_network_pairs: "{{ rdma_network_pairs + [{'server': rdma_outer_server, 'client': item}] }}"
  loop: "{{ rdma_network_host_list | difference([rdma_outer_server]) }}"
  loop_control:
    label: "{{ rdma_outer_server }} -> {{ item }}"
