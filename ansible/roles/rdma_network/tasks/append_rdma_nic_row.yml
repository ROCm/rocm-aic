---
# delegate_facts + delegate_to the same host as the runner often fails to
# merge into hostvars; set facts on inventory_hostname without delegating.

- name: Append parsed NIC row on runner host ({{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: "{{ (rdma_network_rdma_nics | default([])) + [rdma_row_dict] }}"
  vars:
    rdma_parts: "{{ item.split('|') }}"
    rdma_dev_name: "{{ rdma_parts[0] | default('', true) | trim }}"
    rdma_nd_name: "{{ rdma_parts[1] | default('', true) | trim }}"
    rdma_nd_key: "{{ rdma_nd_name | regex_replace('-', '_') }}"
    rdma_iface_fact_raw: >-
      {{
        (hostvars[rdma_discover_host]['ansible_' ~ rdma_nd_name] | default({}))
        if (rdma_nd_name | length > 0) else {}
      }}
    rdma_iface_fact_key: >-
      {{
        (hostvars[rdma_discover_host]['ansible_' ~ rdma_nd_key] | default({}))
        if (rdma_nd_name | length > 0) else {}
      }}
    rdma_ip_raw: >-
      {{
        rdma_iface_fact_raw.ipv4.address
        | default(rdma_iface_fact_raw.ipv4[0].address | default(''))
      }}
    rdma_ip_key: >-
      {{
        rdma_iface_fact_key.ipv4.address
        | default(rdma_iface_fact_key.ipv4[0].address | default(''))
      }}
    rdma_ip_from_iface: >-
      {{
        rdma_ip_raw if (rdma_ip_raw | length > 0) else rdma_ip_key
      }}
    rdma_fb_ip: >-
      {{ hostvars[rdma_discover_host].rdma_network_bind_ipv4 | default('', true) | trim }}
    rdma_row_dict:
      device: "{{ rdma_dev_name }}"
      netdev: "{{ rdma_nd_name }}"
      ipv4: >-
        {{
          rdma_ip_from_iface
          if (rdma_ip_from_iface | length > 0) else
          (rdma_fb_ip if (rdma_fb_ip | length > 0) else '')
        }}
  when:
    - rdma_dev_name | length > 0
    - rdma_discover_host == inventory_hostname

- name: Append parsed NIC row on delegated host ({{ rdma_discover_host }})
  ansible.builtin.set_fact:
    rdma_network_rdma_nics: >-
      {{
        (hostvars[rdma_discover_host].rdma_network_rdma_nics | default([]))
        + [rdma_row_dict]
      }}
  vars:
    rdma_parts: "{{ item.split('|') }}"
    rdma_dev_name: "{{ rdma_parts[0] | default('', true) | trim }}"
    rdma_nd_name: "{{ rdma_parts[1] | default('', true) | trim }}"
    rdma_nd_key: "{{ rdma_nd_name | regex_replace('-', '_') }}"
    rdma_iface_fact_raw: >-
      {{
        (hostvars[rdma_discover_host]['ansible_' ~ rdma_nd_name] | default({}))
        if (rdma_nd_name | length > 0) else {}
      }}
    rdma_iface_fact_key: >-
      {{
        (hostvars[rdma_discover_host]['ansible_' ~ rdma_nd_key] | default({}))
        if (rdma_nd_name | length > 0) else {}
      }}
    rdma_ip_raw: >-
      {{
        rdma_iface_fact_raw.ipv4.address
        | default(rdma_iface_fact_raw.ipv4[0].address | default(''))
      }}
    rdma_ip_key: >-
      {{
        rdma_iface_fact_key.ipv4.address
        | default(rdma_iface_fact_key.ipv4[0].address | default(''))
      }}
    rdma_ip_from_iface: >-
      {{
        rdma_ip_raw if (rdma_ip_raw | length > 0) else rdma_ip_key
      }}
    rdma_fb_ip: >-
      {{ hostvars[rdma_discover_host].rdma_network_bind_ipv4 | default('', true) | trim }}
    rdma_row_dict:
      device: "{{ rdma_dev_name }}"
      netdev: "{{ rdma_nd_name }}"
      ipv4: >-
        {{
          rdma_ip_from_iface
          if (rdma_ip_from_iface | length > 0) else
          (rdma_fb_ip if (rdma_fb_ip | length > 0) else '')
        }}
  when:
    - rdma_dev_name | length > 0
    - rdma_discover_host != inventory_hostname
  delegate_to: "{{ rdma_discover_host }}"
  delegate_facts: true
