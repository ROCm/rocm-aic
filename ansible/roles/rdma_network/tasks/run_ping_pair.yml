---
# ping = one row from rdma_network_ping_tests (server, client, binds, netdevs).

- name: Require ICMP destination for {{ ping.server }} -> {{ ping.client }}
  ansible.builtin.assert:
    that:
      - ping.client_bind | default('') | trim | length > 0
    fail_msg: >-
      full_ping: empty client_bind for {{ ping.server }} -> {{ ping.client }}.

- name: Build ping argv (use -I when server_bind is set for fabric path)
  ansible.builtin.set_fact:
    rdma_ping_argv: >-
      {{
        rdma_ping_argv_bound
        if (ping.server_bind | default('') | trim | length) > 0
        else rdma_ping_argv_plain
      }}
  vars:
    rdma_sb: "{{ ping.server_bind | default('') | trim | split('/') | first }}"
    rdma_db: "{{ ping.client_bind | default('') | trim | split('/') | first }}"
    rdma_count: "{{ rdma_network_ping_count | int | string }}"
    rdma_wait: "{{ rdma_network_ping_deadline_sec | int | string }}"
    rdma_ping_argv_bound:
      - ping
      - -c
      - "{{ rdma_count }}"
      - -w
      - "{{ rdma_wait }}"
      - -I
      - "{{ rdma_sb }}"
      - "{{ rdma_db }}"
    rdma_ping_argv_plain:
      - ping
      - -c
      - "{{ rdma_count }}"
      - -w
      - "{{ rdma_wait }}"
      - "{{ rdma_db }}"

- name: >-
    ICMP ping {{ ping.server }}@{{ ping.server_bind | default('(default route)', true) | trim | split('/') | first }}
    -> {{ ping.client }}@{{ ping.client_bind | default('', true) | trim | split('/') | first }}
  ansible.builtin.command:
    argv: "{{ rdma_ping_argv }}"
  register: rdma_ping_cmd
  changed_when: false
  failed_when: false
  async: >-
    {{
      (rdma_network_ping_deadline_sec | int)
      + (rdma_network_ping_async_slack_sec | default(2) | int)
    }}
  poll: 2
  delegate_to: "{{ ping.server }}"

- name: Record ICMP ping result for JSON/report
  ansible.builtin.set_fact:
    rdma_network_ping_results: "{{ (rdma_network_ping_results | default([])) + [rdma_ping_json] }}"
  vars:
    rdma_lim: 4000
    rdma_ping_json:
      source_host: "{{ ping.server }}"
      target_host: "{{ ping.client }}"
      ping_source_ip: "{{ ping.server_bind | default('') | trim | split('/') | first }}"
      ping_destination: "{{ ping.client_bind | default('') | trim | split('/') | first }}"
      ping_target_mode: "{{ rdma_network_ping_target | default('fabric') }}"
      server_netdev: "{{ ping.server_netdev | default('', true) }}"
      client_netdev: "{{ ping.client_netdev | default('', true) }}"
      server_rdma_device: "{{ ping.server_device | default('', true) }}"
      client_rdma_device: "{{ ping.client_device | default('', true) }}"
      packets: "{{ rdma_network_ping_count | int }}"
      return_code: "{{ rdma_ping_cmd.rc | default(-1) | int }}"
      stdout_excerpt: "{{ (rdma_ping_cmd.stdout | default('') | string)[:rdma_lim] }}"
      stderr_excerpt: "{{ (rdma_ping_cmd.stderr | default('') | string)[:800] }}"

- name: Append ICMP ping line to controller report
  when: rdma_network_write_report | bool
  ansible.builtin.lineinfile:
    path: "{{ rdma_network_report_path }}"
    mode: "0644"
    line: >-
      {{ rdma_network_report_ts }}
      ping src={{ ping.server }} src_ip={{ ping.server_bind | default('', true) | trim | split('/') | first }}
      dst={{ ping.client }} dst_ip={{ ping.client_bind | default('', true) | trim | split('/') | first }}
      sdev={{ ping.server_netdev | default('', true) }} cdev={{ ping.client_netdev | default('', true) }}
      rc={{ rdma_ping_cmd.rc | default('n/a') }}
      OUT={{ (rdma_ping_cmd.stdout | default(''))
        | replace('\n', ' ')
        | truncate(2000, True, '...') }}
  delegate_to: localhost
  vars:
    ansible_connection: local
