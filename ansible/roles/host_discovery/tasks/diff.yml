---
- name: Build per-host comparable summary
  ansible.builtin.set_fact:
    _comparable: >-
      {{ dict(ansible_play_hosts | map('extract', hostvars)
         | map(attribute='inventory_hostname')
         | zip(ansible_play_hosts | map('extract', hostvars)
               | map(attribute='host_report'))) }}

- name: Identify fields that differ across hosts
  ansible.builtin.set_fact:
    host_diffs: >-
      {% set ns = namespace(result={}) -%}
      {% set fields = ['kernel', 'distro', 'architecture',
                       'cpu_model', 'cpu_count', 'memory_gb',
                       'rocm_version'] -%}
      {% for field in fields -%}
        {% set vals = _comparable.values()
                      | map(attribute=field)
                      | list -%}
        {% if vals | unique | list | length > 1 -%}
          {% set per_host = {} -%}
          {% for h in _comparable -%}
            {% set _ = per_host.update(
                 {h: _comparable[h][field]}) -%}
          {% endfor -%}
          {% set _ = ns.result.update(
               {field: per_host}) -%}
        {% endif -%}
      {% endfor -%}
      {% set gpu_counts = {} -%}
      {% for h in _comparable -%}
        {% set _ = gpu_counts.update(
             {h: _comparable[h].gpus.pci_devices
                 | length}) -%}
      {% endfor -%}
      {% if gpu_counts.values() | unique | list
            | length > 1 -%}
        {% set _ = ns.result.update(
             {'gpu_count': gpu_counts}) -%}
      {% endif -%}
      {% set nvme_counts = {} -%}
      {% for h in _comparable -%}
        {% set _ = nvme_counts.update(
             {h: _comparable[h].nvme.drives
                 | length}) -%}
      {% endfor -%}
      {% if nvme_counts.values() | unique | list
            | length > 1 -%}
        {% set _ = ns.result.update(
             {'nvme_count': nvme_counts}) -%}
      {% endif -%}
      {% set dkms_sets = {} -%}
      {% for h in _comparable -%}
        {% set _ = dkms_sets.update(
             {h: _comparable[h].dkms | sort
                 | join(' | ')}) -%}
      {% endfor -%}
      {% if dkms_sets.values() | unique | list
            | length > 1 -%}
        {% set _ = ns.result.update(
             {'dkms': dkms_sets}) -%}
      {% endif -%}
      {% set ais_vals = {} -%}
      {% for h in _comparable -%}
        {% set _ = ais_vals.update(
             {h: _comparable[h].ais
                 | to_json}) -%}
      {% endfor -%}
      {% if ais_vals.values() | unique | list
            | length > 1 -%}
        {% set _ = ns.result.update(
             {'ais': ais_vals}) -%}
      {% endif -%}
      {% set ri_gpu_counts = {} -%}
      {% for h in _comparable -%}
        {% set ri = _comparable[h].rocminfo -%}
        {% set _ = ri_gpu_counts.update(
             {h: ri.gpu_count
                 | default(0)}) -%}
      {% endfor -%}
      {% if ri_gpu_counts.values() | unique | list
            | length > 1 -%}
        {% set _ = ns.result.update(
             {'rocminfo_gpu_count':
              ri_gpu_counts}) -%}
      {% endif -%}
      {% set ri_gpu_names = {} -%}
      {% for h in _comparable -%}
        {% set ri = _comparable[h].rocminfo -%}
        {% set names = ri.gpus | default([])
               | map(attribute='marketing_name',
                     default='unknown')
               | sort | join(', ') -%}
        {% set _ = ri_gpu_names.update(
             {h: names}) -%}
      {% endfor -%}
      {% if ri_gpu_names.values() | unique | list
            | length > 1 -%}
        {% set _ = ns.result.update(
             {'rocminfo_gpu_models':
              ri_gpu_names}) -%}
      {% endif -%}
      {{ ns.result }}

- name: Print cross-host diff to stdout
  ansible.builtin.debug:
    msg: |

      ========== CROSS-HOST DIFFERENCES ==========
      {% if host_diffs | length == 0 %}
      All hosts are identical across checked fields.
      {% else %}
      {% for field, per_host in host_diffs.items() %}
      {{ field }}:
      {% for h, val in per_host.items() %}
        {{ h }}: {{ val }}
      {% endfor %}
      {% endfor %}
      {% endif %}
      ===============================================

- name: Print all-identical confirmation
  ansible.builtin.debug:
    msg: "All hosts match on kernel, distro, arch, CPU, \
      memory, ROCm, GPU count, NVMe count, DKMS, \
      AIS, and rocminfo."
  when: host_diffs | length == 0

- name: Write cross-host diff JSON report
  ansible.builtin.copy:
    content: "{{ host_diffs | to_nice_json }}\n"
    dest: >-
      {{ hostvars[ansible_play_hosts[0]].report_dir
      }}/diff.json
    mode: "0644"
  delegate_to: localhost

- name: Build cluster summary
  ansible.builtin.set_fact:
    cluster_summary: >-
      {% set ns = namespace(hosts={}) -%}
      {% for h in _comparable -%}
        {% set r = _comparable[h] -%}
        {% set ri = r.rocminfo | default({}) -%}
        {% set gpu_names = ri.gpus | default([])
               | map(attribute='marketing_name',
                     default='unknown')
               | list -%}
        {% set gpu_gfx = ri.gpus | default([])
               | map(attribute='name',
                     default='unknown')
               | list -%}
        {% set nvme_list = [] -%}
        {% for d in r.nvme.drives -%}
          {% set _ = nvme_list.append(
               {'device': d.name | default('?'),
                'size': d.size | default('?'),
                'model': d.model
                         | default('?')}) -%}
        {% endfor -%}
        {% set rdma_active = r.rdma.links
               | default([])
               | select('search', 'ACTIVE')
               | list | length -%}
        {% set rdma_total = r.rdma.links
               | default([])
               | length -%}
        {% set net_ns = r.net | default({}) -%}
        {% set net_total = net_ns.total | default(0) | int -%}
        {% set net_active = net_ns.active | default(0) | int -%}
        {% set entry = {
             'kernel': r.kernel,
             'rocm_version': r.rocm_version,
             'dkms': r.dkms,
             'gpus': {
               'count': ri.gpu_count | default(0),
               'gfx_targets': gpu_gfx,
               'models': gpu_names},
             'nvme': {
               'count': r.nvme.drives | length,
               'drives': nvme_list},
             'rdma': {
               'total_links': rdma_total,
               'active_links': rdma_active},
             'net': {
               'total': net_total,
               'active': net_active}
           } -%}
        {% set _ = ns.hosts.update(
             {h: entry}) -%}
      {% endfor -%}
      {{ ns.hosts }}

- name: Print cluster summary to stdout
  ansible.builtin.debug:
    msg: |

      ========== CLUSTER SUMMARY ==========
      {% for h, s in cluster_summary.items() %}
      {{ h }}:
        Kernel .... {{ s.kernel }}
        ROCm ...... {{ s.rocm_version }}
        GPUs ...... {{ s.gpus.count }}x {{ s.gpus.models
                     | unique | join(', ') }}
                    ({{ s.gpus.gfx_targets
                     | unique | join(', ') }})
        NVMe ...... {{ s.nvme.count }} drives
        RDMA ...... {{ s.rdma.active_links }}/{{
                     s.rdma.total_links }} active
        NET ....... {{ s.net.active }}/{{ s.net.total }} active
        DKMS ...... {{ s.dkms | length }} modules
        {% for line in s.dkms %}
        {{ line }}
        {% endfor %}
      {% endfor %}
      =======================================

- name: Write cluster summary JSON
  ansible.builtin.copy:
    content: "{{ cluster_summary | to_nice_json }}\n"
    dest: >-
      {{ hostvars[ansible_play_hosts[0]].report_dir
      }}/summary.json
    mode: "0644"
  delegate_to: localhost
