---
- name: Query network interfaces (brief)
  ansible.builtin.command:
    cmd: ip -brief link show
  register: net_link_raw
  changed_when: false
  failed_when: false

- name: Build NET facts
  ansible.builtin.set_fact:
    net_ip_brief_lines: "{{ net_link_raw.stdout_lines | default([]) }}"
    net_iface_total: >-
      {{ net_link_raw.stdout_lines | default([])
         | reject('regex', '^lo\s')
         | list | length }}
    net_iface_up: >-
      {{ net_link_raw.stdout_lines | default([])
         | reject('regex', '^lo\s')
         | select('regex', '\sUP\s')
         | list | length }}
