---
nvmeof_teardown_target_service: nvmeof-target
nvmeof_teardown_target_modules_file: /etc/modules-load.d/nvmeof-target.conf
nvmeof_teardown_target_cleanup_script: /usr/local/bin/nvmeof-target-cleanup.sh

# Set true only if you want to remove the generated unit/script files after
# the service is disabled and stopped.
nvmeof_teardown_remove_target_service_files: false
nvmeof_teardown_target_service_files:
  - /etc/systemd/system/nvmeof-target.service
  - /usr/local/bin/nvmeof-target-setup.sh
  - /usr/local/bin/nvmeof-target-cleanup.sh

nvmeof_teardown_disconnect_nqns: >-
  {{
    nvmeof_setup_connections
    | default([])
    | selectattr('nqn', 'defined')
    | map(attribute='nqn')
    | unique
    | list
  }}
