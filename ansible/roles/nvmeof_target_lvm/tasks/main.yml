---
- name: LVM aggregation for nvmet (optional)
  when: nvmeof_target_lvm_enable | bool
  block:
    - name: Require at least two physical devices for aggregation
      ansible.builtin.assert:
        that:
          - (nvmeof_target_lvm_pv_devices | default([]) | length) >= 2
        fail_msg: >-
          Set nvmeof_target_lvm_pv_devices to two or more block devices
          (e.g. multiple NVMe namespaces) when nvmeof_target_lvm_enable is true.

    - name: Stat each candidate physical volume
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ nvmeof_target_lvm_pv_devices }}"
      register: nvmeof_target_lvm_pv_stat

    - name: Fail when a physical volume path is missing
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isblk | default(false) or item.stat.islnk | default(false)
        fail_msg: >-
          Path {{ item.item }} is missing or not a usable block/symlink device.
      loop: "{{ nvmeof_target_lvm_pv_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Install LVM2
      ansible.builtin.package:
        name: lvm2
        state: present

    - name: Wipe filesystem signatures on physical volumes (destructive)
      ansible.builtin.command:
        argv:
          - wipefs
          - "-a"
          - "{{ item }}"
      loop: "{{ nvmeof_target_lvm_pv_devices }}"
      when: nvmeof_target_lvm_wipefs | bool
      changed_when: true

    - name: Create or update volume group spanning physical volumes
      community.general.lvg:
        vg: "{{ nvmeof_target_lvm_vg_name }}"
        pvs: "{{ nvmeof_target_lvm_pv_devices }}"
        state: present
        remove_extra_pvs: "{{ nvmeof_target_lvm_remove_extra_pvs | bool }}"

    - name: Create linear logical volume for nvmet export
      community.general.lvol:
        vg: "{{ nvmeof_target_lvm_vg_name }}"
        lv: "{{ nvmeof_target_lvm_lv_name }}"
        size: "{{ nvmeof_target_lvm_lv_size }}"
        state: present

    - name: Resolve exported block device path
      ansible.builtin.set_fact:
        nvmeof_target_lvm_export_device: "/dev/{{ nvmeof_target_lvm_vg_name }}/{{ nvmeof_target_lvm_lv_name }}"

    - name: Confirm logical volume device node exists
      ansible.builtin.stat:
        path: "{{ nvmeof_target_lvm_export_device }}"
      register: nvmeof_target_lvm_lv_stat

    - name: Fail when logical volume path is missing
      ansible.builtin.assert:
        that:
          - nvmeof_target_lvm_lv_stat.stat.exists
        fail_msg: >-
          Expected LV device {{ nvmeof_target_lvm_export_device }} missing after
          lvol; check vg/lv names and LVM errors above.

    - name: Require nvmeof_setup_subsystems for namespace patch
      when: nvmeof_target_lvm_patch_first_namespace | bool
      ansible.builtin.assert:
        that:
          - nvmeof_setup_subsystems is defined
          - (nvmeof_setup_subsystems | length) > 0
          - nvmeof_setup_subsystems[0].namespaces is defined
          - (nvmeof_setup_subsystems[0].namespaces | length) > 0
        fail_msg: >-
          nvmeof_setup_subsystems must define at least one subsystem with
          namespaces when nvmeof_target_lvm_patch_first_namespace is true.

    - name: Patch first subsystem namespace to use aggregated LV
      when: nvmeof_target_lvm_patch_first_namespace | bool
      ansible.builtin.set_fact:
        nvmeof_setup_subsystems: "{{ _nvmeof_subs_patched }}"
      vars:
        _subs: "{{ nvmeof_setup_subsystems }}"
        _ns_list: "{{ _subs[0].namespaces }}"
        _first_ns: "{{ _ns_list[0] | combine({'device_path': nvmeof_target_lvm_export_device}) }}"
        _new_ns_list: "{{ [_first_ns] + (_ns_list[1:] | default([])) }}"
        _new_sub0: "{{ _subs[0] | combine({'namespaces': _new_ns_list}) }}"
        _nvmeof_subs_patched: "{{ [_new_sub0] + (_subs[1:] | default([])) }}"

    - name: Show aggregated LV and nvmet backing path
      ansible.builtin.debug:
        msg: >-
          LV {{ nvmeof_target_lvm_export_device }}; nvmet namespace device_path
          is {{
            nvmeof_setup_subsystems[0].namespaces[0].device_path
            if (nvmeof_target_lvm_patch_first_namespace | bool)
            else '(unchanged — set device_path to LV or enable patch)'
          }}.
