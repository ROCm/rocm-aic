---
# When true, create a linear LV spanning nvmeof_target_lvm_pv_devices, then
# set_fact nvmeof_setup_subsystems so the first namespace uses that LV as the
# nvmet backing device (run this role before sbates130272.batesste.nvmeof_setup).
nvmeof_target_lvm_enable: false

# Two or more whole-disk NVMe namespaces (or block devices) on the target.
nvmeof_target_lvm_pv_devices:
  - /dev/nvme0n1
  - /dev/nvme1n1

nvmeof_target_lvm_vg_name: nvmeof_vg
nvmeof_target_lvm_lv_name: nvmeof_lv
nvmeof_target_lvm_lv_size: 100%FREE

# If false, leave nvmeof_setup_subsystems from inventory unchanged (you must
# set device_path to the LV yourself).
nvmeof_target_lvm_patch_first_namespace: true

# community.general.lvg: do not drop PVs omitted from the list (safer).
nvmeof_target_lvm_remove_extra_pvs: false

# Destructive: wipe signatures on each PV before pvcreate (use once on blank
# disks only).
nvmeof_target_lvm_wipefs: false
