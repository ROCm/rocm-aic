---
nfs_rdma_export_vg: nvmeof_vg
nfs_rdma_export_lv: nvmeof_lv
nfs_rdma_export_device: "/dev/{{ nfs_rdma_export_vg }}/{{ nfs_rdma_export_lv }}"
nfs_rdma_export_mount: /srv/rocm-icms-cache
nfs_rdma_export_path: "{{ nfs_rdma_export_mount }}"
nfs_rdma_filesystem_type: xfs
nfs_rdma_recreate_filesystem: false
nfs_rdma_export_mount_options: noatime

nfs_rdma_server_ip: ""
nfs_rdma_server_interface: "{{ nvmeof_setup_target_interface | default('') }}"
nfs_rdma_client_ips: []
nfs_rdma_export_clients: []
nfs_rdma_export_options: rw,sync,no_subtree_check,no_root_squash
nfs_rdma_port: 20049

nfs_rdma_server_packages:
  - nfs-kernel-server
  - nfs-common
  - rdma-core
  - ibverbs-utils
  - infiniband-diags
  - lvm2
  - xfsprogs

nfs_rdma_server_modules:
  - svcrdma
nfs_rdma_persist_modules: true

nfs_rdma_exports_file: /etc/exports.d/rocm-icms-nfs-rdma.exports
nfs_rdma_port_service_name: rocm-icms-nfs-rdma-port
