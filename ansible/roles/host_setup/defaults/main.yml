---
# Overridden by inventory group_vars/gpu_nodes.yml for this project.
extra_packages: []

# Before rocm_setup: drop rocm.list if it matches bad URLs or duplicates
# deb822 rocm.sources (so the collection's first apt update can succeed).
host_setup_preclean_rocm_list: true
host_setup_preclean_rocm_list_bad_regex: "26\\.11"

# After rocm_setup: remove one-line lists that duplicate deb822 rocm.sources.
host_setup_remove_duplicate_amdgpu_list: true
host_setup_remove_legacy_rocm_list: true
