---
# Overridden by inventory group_vars/gpu_nodes.yml for this project.
extra_packages: []

# Before rocm_setup: drop rocm.list if it matches bad URLs or duplicates
# deb822 rocm.sources (so the collection's first apt update can succeed).
host_setup_preclean_rocm_list: true
host_setup_preclean_rocm_list_bad_regex: "26\\.11"

# After rocm_setup: remove one-line lists that duplicate deb822 rocm.sources.
host_setup_remove_duplicate_amdgpu_list: true
host_setup_remove_legacy_rocm_list: true

# udev: mlx|bnxt|ionic-prefixed netdev + infiniband names (after rdma_setup).
# Default off: this path has disrupted node networking; enable deliberately
# when naming rules and apply strategy (below) are validated for your fabric.
host_setup_udev_rename: false
# When udev_rename is true and this is true: udevadm reload + live trigger for
# net and infiniband (can break SSH on a renamed NIC). Prefer false and reboot
# to apply rules; set true only when safe for your login path.
host_setup_udev_rename_live_apply: false
host_setup_udev_rules_file: 70-rocm-icms-net-rdma.rules

# After extra_packages: enable systemd unit for prometheus-node-exporter.
host_setup_enable_prometheus_node_exporter: true
# Shared directory for all node_exporter textfile metrics on this host.
host_setup_node_exporter_textfile_dir: /var/lib/node_exporter/textfile_collector
# Extra ARGS appended in /etc/default/prometheus-node-exporter (optional).
host_setup_node_exporter_extra_args: []

# When false, skip AMD apt preclean, sbates130272.batesste.rocm_setup, and
# post-rocm apt dedupe (faster provision when ROCm is already installed).
host_setup_enable_rocm_setup: true

# After rocm_setup: ensure /etc/metrics/config.json sets MetricsFieldPrefix so
# Prometheus exposes amd_gpu_* metrics matching Grafana dashboard 23434.
host_setup_amd_metrics_exporter_grafana_compat: true

# Build hipFile and ROCm/fio with libhipfile via the collection role. Heavy;
# tag hipfile_fio to scope. Local tasks only add update-alternatives and
# observability behavior that the collection role does not cover.
host_setup_install_hipfile_fio_stack: false
host_setup_rocm_path: /opt/rocm
host_setup_fio_libhipfile_prefix: /opt/rocm-icms/fio-libhipfile
host_setup_hipfile_build_jobs: "{{ ansible_processor_vcpus | default(2) | int }}"
# Register distro fio and libhipfile fio with update-alternatives (distro default).
# Uses dpkg-divert for packaged /usr/bin/fio; set false to only use full path
# {{ host_setup_fio_libhipfile_prefix }}/bin/fio
host_setup_fio_libhipfile_alternatives: false
host_setup_fio_distro_divert_path: /usr/lib/rocm-icms/fio-from-distro
host_setup_fio_alternative_priority_distro: 100
host_setup_fio_alternative_priority_libhipfile: 50

# AIS / hipFile observability (bpftrace uprobe CSV + optional node_exporter
# textfile). rocs-internal/ais-eap has no in-tree bpftrace or exporter; this
# ships the libhipfile.bt recipe aligned with the hipFile stack.
host_setup_ais_hipfile_observability: false
host_setup_ais_hipfile_install_root: /usr/lib/rocm-icms/ais-hipfile
host_setup_ais_hipfile_textfile_metrics: true
# Textfile path (node_exporter ARGS configured by node_exporter.yml).
host_setup_ais_hipfile_textfile_dir: "{{ host_setup_node_exporter_textfile_dir }}"

# Textfile metrics for Grafana cluster summary (ROCm + AMDGPU versions).
host_setup_rocm_icms_version_textfile: true
host_setup_rocm_icms_lib_dir: /usr/lib/rocm-icms
host_setup_rocm_icms_versions_script_path: >-
  {{ host_setup_rocm_icms_lib_dir }}/rocm-icms-stack-versions.sh
host_setup_rocm_icms_textfile_dir: "{{ host_setup_node_exporter_textfile_dir }}"

# rocm-aic-exporter: LMCache / vLLM host metrics via node_exporter textfile.
host_setup_rocm_aic_exporter_enabled: true
host_setup_rocm_aic_exporter_install_dir: /opt/rocm-aic-exporter
host_setup_rocm_aic_exporter_script_src: >-
  {{ role_path }}/../../../recipies/vllm-lmcache-hipfile/scripts/rocm-aic-exporter.py
host_setup_rocm_aic_exporter_textfile_path: >-
  {{ host_setup_node_exporter_textfile_dir }}/rocm_aic_exporter.prom
host_setup_rocm_aic_exporter_vlh_host_data_root: /mnt/lmcache-nvme
host_setup_rocm_aic_exporter_lmcache_kv_subdir: lmcache
host_setup_rocm_aic_exporter_lmcache_chunk_stats_subdir: lmcache_chunk_stats
