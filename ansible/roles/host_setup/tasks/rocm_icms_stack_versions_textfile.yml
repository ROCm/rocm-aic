# Publishes rocm_icms_software_version for the Grafana cluster summary table.

---
- name: Ensure ROCm-ICMS lib directory exists
  ansible.builtin.file:
    path: "{{ host_setup_rocm_icms_lib_dir }}"
    state: directory
    mode: "0755"

- name: Install ROCm/amdgpu version publisher script
  ansible.builtin.template:
    src: rocm_icms_stack_versions.sh.j2
    dest: "{{ host_setup_rocm_icms_versions_script_path }}"
    mode: "0755"

- name: Ensure node_exporter textfile directory exists for stack versions
  ansible.builtin.file:
    path: "{{ host_setup_rocm_icms_textfile_dir }}"
    state: directory
    mode: "0755"

- name: Install systemd unit for stack version textfile
  ansible.builtin.template:
    src: rocm-icms-stack-versions.service.j2
    dest: /etc/systemd/system/rocm-icms-stack-versions.service
    mode: "0644"
  notify: Reload systemd for rocm-icms stack versions

- name: Install systemd timer for stack version textfile
  ansible.builtin.template:
    src: rocm-icms-stack-versions.timer.j2
    dest: /etc/systemd/system/rocm-icms-stack-versions.timer
    mode: "0644"
  notify: Reload systemd for rocm-icms stack versions

- name: Enable and start stack version textfile timer
  ansible.builtin.systemd:
    name: rocm-icms-stack-versions.timer
    state: started
    enabled: true
    daemon_reload: true

- name: Run stack version publisher once
  ansible.builtin.command:
    cmd: "{{ host_setup_rocm_icms_versions_script_path }}"
  changed_when: false
