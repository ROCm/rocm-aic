#
# rocs-internal/ais-eap does not ship bpftrace scripts or a Prometheus exporter in
# tree; this matches the libhipfile uprobe CSV recipe used with the AIS/hipFile
# stack (same program as vendors/dell/vllm-lmcache-hipfile/scripts/hipfile.bt).

---
- name: Install bpftrace for AIS hipFile uprobe tracing
  ansible.builtin.apt:
    name: bpftrace
    state: present
    update_cache: false

- name: Ensure AIS hipFile observability install directory exists
  ansible.builtin.file:
    path: "{{ host_setup_ais_hipfile_install_root }}"
    state: directory
    mode: "0755"

- name: Install hipFile bpftrace program
  ansible.builtin.copy:
    src: ais_hipfile/hipfile.bt
    dest: "{{ host_setup_ais_hipfile_install_root }}/hipfile.bt"
    mode: "0644"

- name: Install trace-hipfile helper script
  ansible.builtin.template:
    src: ais_hipfile/trace-hipfile.sh.j2
    dest: "{{ host_setup_ais_hipfile_install_root }}/trace-hipfile.sh"
    mode: "0755"

- name: Symlink trace-hipfile into PATH
  ansible.builtin.file:
    src: "{{ host_setup_ais_hipfile_install_root }}/trace-hipfile.sh"
    dest: /usr/local/bin/trace-hipfile
    state: link
    force: true

- name: Resolve libhipfile soname for textfile metrics
  ansible.builtin.shell: |
    set -euo pipefail
    shopt -s nullglob
    for d in "{{ host_setup_rocm_path }}/lib" "{{ host_setup_rocm_path }}/lib64"; do
      [[ -d "$d" ]] || continue
      for f in "$d"/libhipfile.so*; do
        basename "$f"
        exit 0
      done
    done
    exit 1
  args:
    executable: /bin/bash
  register: host_setup_ais_hipfile_soname_probe
  changed_when: false
  failed_when: false

- name: Set AIS hipFile textfile metric facts
  ansible.builtin.set_fact:
    host_setup_ais_hipfile_lib_gauge: "{{ 1 if (host_setup_ais_hipfile_soname_probe.rc | int) == 0 else 0 }}"
    host_setup_ais_hipfile_soname: "{{ host_setup_ais_hipfile_soname_probe.stdout | default('') | trim }}"

- name: Ensure node_exporter textfile collector directory exists
  ansible.builtin.file:
    path: "{{ host_setup_ais_hipfile_textfile_dir }}"
    state: directory
    mode: "0755"
  when: host_setup_ais_hipfile_textfile_metrics | default(true) | bool

- name: Publish AIS hipFile textfile metrics for node_exporter
  ansible.builtin.template:
    src: ais_hipfile/ais_hipfile.prom.j2
    dest: "{{ host_setup_ais_hipfile_textfile_dir }}/ais_hipfile.prom"
    mode: "0644"
  when: host_setup_ais_hipfile_textfile_metrics | default(true) | bool
