---
- name: Configure local user account and environment
  ansible.builtin.include_role:
    name: sbates130272.batesste.user_setup
  tags:
    - user_setup

- name: Install preferred development packages
  ansible.builtin.include_role:
    name: sbates130272.batesste.fave_packages
  tags:
    - fave_packages
    - packages

- name: Install project-specific extra packages
  ansible.builtin.package:
    name: "{{ extra_packages }}"
    state: present
  when: extra_packages | length > 0
  tags:
    - extra_packages
    - packages

- name: Enable prometheus-node-exporter service
  ansible.builtin.include_tasks: node_exporter.yml
  tags:
    - node_exporter
    - provision
  when: host_setup_enable_prometheus_node_exporter | default(true) | bool

- name: Install NVMe Prometheus exporter
  ansible.builtin.include_role:
    name: sbates130272.batesste.nvme_exporter_setup
  tags:
    - nvme_exporter
    - provision
  when: nvme_exporter_setup_install | default(false) | bool

- name: Configure RDMA and InfiniBand prerequisites
  ansible.builtin.include_role:
    name: sbates130272.batesste.rdma_setup
  tags:
    - rdma_setup

- name: Install udev rules renaming RoCE netdevs and RDMA CA devices
  ansible.builtin.include_tasks:
    file: udev_rename.yml
    apply:
      tags:
        - udev_rename
        - provision
  when: host_setup_udev_rename | bool
  tags:
    - udev_rename
    - provision

- name: Preclean stale AMD APT lists before rocm_setup
  ansible.builtin.include_tasks: apt_preclean_amd_repos.yml
  when: host_setup_enable_rocm_setup | default(true) | bool
  tags:
    - rocm_setup

- name: Install and configure ROCm stack
  ansible.builtin.include_role:
    name: sbates130272.batesste.rocm_setup
  when: host_setup_enable_rocm_setup | default(true) | bool
  tags:
    - rocm_setup

- name: Dedupe AMD APT lists after rocm_setup
  ansible.builtin.include_tasks: apt_dedupe_amd_repos.yml
  when: host_setup_enable_rocm_setup | default(true) | bool
  tags:
    - rocm_setup

- name: Build and install hipFile and libhipfile-enabled fio
  ansible.builtin.include_tasks:
    file: hipfile_fio.yml
    apply:
      tags:
        - hipfile_fio
        - provision
  when:
    - host_setup_install_hipfile_fio_stack | default(false) | bool
    - ansible_os_family == "Debian"
    - ansible_pkg_mgr == "apt"
  tags:
    - hipfile_fio
    - provision

- name: AIS hipFile observability (bpftrace + node_exporter textfile)
  ansible.builtin.include_tasks:
    file: ais_hipfile_observability.yml
    apply:
      tags:
        - ais_hipfile_observability
        - provision
  when:
    - host_setup_install_hipfile_fio_stack | default(false) | bool
    - host_setup_ais_hipfile_observability | default(false) | bool
    - ansible_os_family == "Debian"
    - ansible_pkg_mgr == "apt"
  tags:
    - ais_hipfile_observability
    - provision
