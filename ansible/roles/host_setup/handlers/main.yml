---
- name: Reload systemd for rocm-icms stack versions
  ansible.builtin.systemd:
    daemon_reload: true

- name: Apt update after AMD repo dedupe
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 0

- name: Restart amd-metrics-exporter
  ansible.builtin.systemd:
    name: amd-metrics-exporter.service
    state: restarted
  become: true
