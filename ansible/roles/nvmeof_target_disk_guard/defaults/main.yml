---
# When false, skip mount/fs/swap/LVM-PV checks (not recommended).
nvmeof_target_disk_guard_enable: true

# Mirrored from nvmeof_target_lvm so this role runs first and still honors
# inventory (same variable names as roles/nvmeof_target_lvm/defaults/main.yml).
nvmeof_target_lvm_enable: false
nvmeof_target_lvm_pv_devices: []
