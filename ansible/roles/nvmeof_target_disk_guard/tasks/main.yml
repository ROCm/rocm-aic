---
- name: Refuse nvmeof/LVM if backing disks are mounted or in use
  when: nvmeof_target_disk_guard_enable | default(true) | bool
  block:
    - name: Start empty guard device list
      ansible.builtin.set_fact:
        nvmeof_disk_guard_devices: []

    - name: Add namespace backing device_path values
      ansible.builtin.set_fact:
        nvmeof_disk_guard_devices: "{{ nvmeof_disk_guard_devices + [item.1.device_path] }}"
      loop: "{{ nvmeof_setup_subsystems | default([]) | subelements('namespaces', skip_missing=True) }}"

    - name: Add LVM physical volumes when LVM aggregation is enabled
      ansible.builtin.set_fact:
        nvmeof_disk_guard_devices: "{{ nvmeof_disk_guard_devices + (nvmeof_target_lvm_pv_devices | default([])) }}"
      when: nvmeof_target_lvm_enable | default(false) | bool

    - name: Deduplicate guard device list
      ansible.builtin.set_fact:
        nvmeof_disk_guard_devices: "{{ nvmeof_disk_guard_devices | unique | list }}"

    - name: Require at least one backing device to validate
      ansible.builtin.assert:
        that:
          - (nvmeof_disk_guard_devices | length) > 0
        fail_msg: >-
          No backing devices to guard (empty namespaces and no LVM PV list).
          Define nvmeof_setup_subsystems namespaces and/or enable LVM with
          nvmeof_target_lvm_pv_devices.

    - name: Stat each candidate device before safety script
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ nvmeof_disk_guard_devices }}"
      register: nvmeof_disk_guard_stat

    - name: Fail when a configured path is missing or not a block device
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.isblk | default(false) or item.stat.islnk | default(false)
        fail_msg: >-
          {{ item.item }} is not an existing block or dm symlink; fix inventory
          before running nvmeof or LVM tasks.
      loop: "{{ nvmeof_disk_guard_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify no mount, filesystem, swap, or LVM PV on guarded devices
      ansible.builtin.script: "verify_nvmeof_disk_unused.sh {{ item | quote }}"
      loop: "{{ nvmeof_disk_guard_devices }}"
      changed_when: false
