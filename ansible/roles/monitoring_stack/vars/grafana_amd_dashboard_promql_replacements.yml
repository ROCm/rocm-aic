# Substrings must match the raw JSON from Grafana.com API for dashboard 23434
# (backslash-escaped inner quotes around $hostname in "expr" string values).

---
monitoring_stack_amd_dash_promql_replace:
  - old: "avg(avg_over_time(amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"}[10m]))"
    new: "avg by (gpu_id) (avg_over_time(amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"}[10m]))"
  - old: "avg(amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"})"
    new: "avg by (gpu_id) (amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"})"
  - old: "min(amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"})"
    new: "min by (gpu_id) (amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"})"
  - old: "max(amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"})"
    new: "max by (gpu_id) (amd_gpu_gfx_activity{hostname=\\\"$hostname\\\"})"
  - old: "avg((amd_gpu_used_vram) / (amd_gpu_total_vram)) * 100"
    new: "avg by (gpu_id) ((amd_gpu_used_vram{hostname=\\\"$hostname\\\"}) / (amd_gpu_total_vram{hostname=\\\"$hostname\\\"})) * 100"
