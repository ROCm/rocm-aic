---
- name: Enforce Grafana admin password policy
  ansible.builtin.assert:
    that:
      - monitoring_grafana_admin_password is defined
      - monitoring_grafana_admin_password | string | length > 0
    fail_msg: >-
      Set monitoring_grafana_admin_password (vault or -e) or set
      monitoring_grafana_require_admin_password to false.
  when: monitoring_grafana_require_admin_password | default(false) | bool

- name: Install Prometheus from Ubuntu repositories
  ansible.builtin.apt:
    name: prometheus
    state: present
    update_cache: true

- name: Add Grafana apt repository and install Grafana
  ansible.builtin.include_tasks: grafana_repo.yml

- name: Configure Prometheus
  ansible.builtin.include_tasks: prometheus.yml

- name: Configure Grafana
  ansible.builtin.include_tasks: grafana.yml

- name: Enable and start Prometheus
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true

- name: Enable and start Grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
