---
# Image naming
inference_container_image_name: rocm-inference-stack
inference_container_image_tag: latest
inference_container_image: >-
  {{ inference_container_image_name }}:{{ inference_container_image_tag }}

# After build: tarball on the Ansible controller (localhost play)
inference_container_tarball: /tmp/rocm-inference-stack.tar

# Path to Dockerfile directory (repo: recipies/rocm-inference-stack).
# Empty uses playbook_dir/../../recipies/rocm-inference-stack (see build.yml).
inference_container_context_path: ""

# Git URLs / refs (NIXL default: public ROCm/nixl over HTTPS; no BuildKit SSH).
# For a fixed commit or tag, set inference_nixl_git_ref.
inference_nixl_git_url: https://github.com/ROCm/nixl.git
inference_nixl_git_ref: ""
inference_lmcache_git_url: https://github.com/amd-ivaganev/LMCache.git
inference_lmcache_git_sha: bef2e13
inference_hipfile_sha: b2509f2
inference_gpu_archs: gfx942
inference_llm_d_git_url: https://github.com/llm-d/llm-d.git
inference_llm_d_git_ref: main
# Optional llm-d commit (short or full SHA): shallow-clone branch first, then
# git fetch/checkout so charts under /opt/llm-d/src match that revision.
inference_llm_d_git_sha: ""

# Deploy: tarball on remote nodes after copy
inference_container_remote_tarball: /var/tmp/rocm-inference-stack.tar

# Docker packages on Ubuntu targets
inference_docker_packages:
  - docker.io

# Optional systemd unit for a long-running container (off by default)
inference_container_install_service: false
inference_container_service_name: rocm-inference-stack
