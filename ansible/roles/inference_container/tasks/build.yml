---
- name: Resolve container build context path
  ansible.builtin.set_fact:
    inference_container_context_resolved: >-
      {{
        inference_container_context_path
        if (inference_container_context_path | length) > 0
        else (playbook_dir | dirname | dirname)
        ~ '/recipies/rocm-inference-stack'
      }}

- name: Check Dockerfile exists
  ansible.builtin.stat:
    path: "{{ inference_container_context_resolved }}/Dockerfile"
  register: inference_container_dockerfile

- name: Fail when Dockerfile is missing
  ansible.builtin.fail:
    msg: >-
      Dockerfile not found at {{ inference_container_context_resolved }}.
      Set inference_container_context_path if the tree lives elsewhere.
  when: not inference_container_dockerfile.stat.exists

- name: Fail when NIXL URL is SSH (default Dockerfile uses HTTPS clone only)
  ansible.builtin.fail:
    msg: >-
      inference_nixl_git_url must be HTTPS (default
      https://github.com/ROCm/nixl.git). The container clone layer does not use
      BuildKit SSH. Use an HTTPS mirror, token-based HTTPS in CI, or fork the
      Dockerfile if you need a private git@ remote.
  when: inference_nixl_git_url is match('^git@')

- name: Place docker build script on controller
  ansible.builtin.template:
    src: docker_build_controller.sh.j2
    dest: /tmp/rocm_inference_docker_build.sh
    mode: "0755"

- name: Build Docker image on controller (BuildKit)
  ansible.builtin.command: /tmp/rocm_inference_docker_build.sh
  environment:
    DOCKER_BUILDKIT: "1"
  changed_when: true

- name: Save image to tarball on controller
  ansible.builtin.command:
    argv:
      - docker
      - save
      - "-o"
      - "{{ inference_container_tarball }}"
      - "{{ inference_container_image }}"
  changed_when: true
