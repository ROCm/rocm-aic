---
all:
  children:
    gpu_nodes:
      vars:
        ansible_user: "{{ lookup('env', 'ANSIBLE_REMOTE_USER')
          | default('stebates', true) }}"
      hosts:
        # Dev / bench box; SSH from any control node (no ansible_connection:
        # local). Override ansible_host if cluster nodes reach it on another IP.
        snoc-thinkstation:
          ansible_host: 10.0.0.131
        g04u07:
          ansible_host: 10.245.130.131
        g04u13:
          ansible_host: 10.245.130.133
        g04u19:
          ansible_host: 10.245.130.135
    monitoring_server:
      hosts:
        g04u19: {}
    # Bench client: same host can appear here and under gpu_nodes; host vars merge.
    kv_cache_tester:
      hosts:
        g04u07: {}
    # NVMe-oF: one nvmet target and two initiators (overlap gpu_nodes OK).
    nvmeof_target:
      hosts:
        g04u19: {}
    nvmeof_hosts:
      hosts:
        g04u07: {}
        g04u13: {}
    # NFS/RDMA: reuse the former NVMe-oF target LV as a server-owned export.
    nfs_rdma_server:
      hosts:
        g04u19: {}
    nfs_rdma_clients:
      hosts:
        g04u07: {}
        g04u13: {}
