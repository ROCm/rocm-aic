---
# NVMe-oF initiators. nvmeof_setup_target_host must be the inventory hostname
# of the target so traddr resolves from hostvars[<target>].nvmeof_setup_target_ip_resolved.
# Run the nvmeof_target play before this play. Omit traddr here when using
# nvmeof_setup_target_host.

nvmeof_setup_mode: host
nvmeof_setup_transport: rdma
nvmeof_setup_port: 4420

nvmeof_setup_target_host: g04u19

nvmeof_setup_connections:
  - transport: rdma
    trsvcid: "{{ nvmeof_setup_port }}"
    nqn: "nqn.2026-04.com.amd.rocm-aic:gpu-shared-01"
