---
# NFS/RDMA server: g04u19. Use numeric fabric IPs because node names do not
# resolve on the storage fabric.
nfs_rdma_export_device: /dev/nvmeof_vg/nvmeof_lv
nfs_rdma_export_vg: nvmeof_vg
nfs_rdma_export_lv: nvmeof_lv
nfs_rdma_export_mount: /srv/rocm-icms-cache
nfs_rdma_export_path: "{{ nfs_rdma_export_mount }}"
nfs_rdma_filesystem_type: xfs
nfs_rdma_recreate_filesystem: false

nfs_rdma_server_ip: 10.245.130.135
nfs_rdma_client_ips:
  - 10.245.130.131
  - 10.245.130.133
nfs_rdma_export_clients:
  - 10.245.130.131
  - 10.245.130.133
nfs_rdma_export_options: rw,sync,no_subtree_check,no_root_squash
nfs_rdma_port: 20049
