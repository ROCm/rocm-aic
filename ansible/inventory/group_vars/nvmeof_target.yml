---
# NVMe-oF target (kernel nvmet). Role: sbates130272.batesste.nvmeof_setup
# (collection). Run playbooks/discover.yml first; set
# nvmeof_setup_target_interface to the netdev that carries the RoCE/storage
# fabric IPv4 (often the Ethernet-backed name, e.g. enp...np1, not only
# rocep...). When set, nvmeof_setup_target_ip is taken from gather_facts on that
# interface (hyphens in the name map to underscores in ansible_* facts). When
# empty, nvmeof_setup_target_ip uses ansible_default_ipv4, then 192.168.2.1.
#
# Backing device: override namespace device_path to an existing block device
# on the target (the role fails if device_path is missing). For multiple NVMe
# namespaces combined with LVM, set nvmeof_target_lvm_enable: true and
# nvmeof_target_lvm_pv_devices (see roles/nvmeof_target_lvm/defaults/main.yml);
# the LVM role patches the first namespace to use the LV when
# nvmeof_target_lvm_patch_first_namespace is true (default). Role
# nvmeof_target_disk_guard runs before LVM/nvmet and aborts if any backing
# device is mounted, has a fstype, swap, or is already an LVM PV (set
# nvmeof_target_disk_guard_enable: false to skip — not recommended).
#
# Shared namespace caveat: allow_any_host: true lets multiple initiators
# attach the same subsystem; concurrent uncoordinated block I/O from two OSes
# is unsafe without cluster FS, reservations, or read-only policy. This role
# does not configure nvmet/hosts ACLs; to restrict by Host NQN, extend the
# role or manage nvmet outside Ansible.
#
# --- Initial test (4 NVMe namespaces -> one linear LV -> one nvmet NS) ---
# Discovery shows enp159s0np0 with 10.245.130.x/31 on each node; use it for
# nvmet RDMA traddr on the target (g04u19).
#
# g04u19 check (2026-04): / is on nvme0n1p2; nvme3n1 is BOSS-N1 (~894G, not
# PM1733a); nvme5n1 has /data; nvme6n1 has /hipfile. Pool below uses four empty
# 3.84TB PM1733a whole-disk nodes (blkid clean): nvme1n1,nvme2n1,nvme4n1,nvme7n1.
# Re-verify before each apply: ssh g04u19 lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINTS
# Optional one-time: nvmeof_target_lvm_wipefs: true

nvmeof_setup_mode: target
nvmeof_setup_transport: rdma
nvmeof_setup_addr_family: ipv4
nvmeof_setup_port: 4420

nvmeof_setup_target_interface: enp159s0np0

# Fact-backed: primary IPv4 on nvmeof_setup_target_interface, else default route.
nvmeof_setup_target_ip: >-
  {{
    (
      (
        (ansible_facts['ansible_' ~ (nvmeof_setup_target_interface | regex_replace('-', '_'))]
          | default({})).ipv4.address | default('')
      )
      if (nvmeof_setup_target_interface | default('') | length) > 0
      else (ansible_default_ipv4.address | default(''))
    ) | default('192.168.2.1', true)
  }}

nvmeof_target_lvm_enable: true
nvmeof_target_lvm_pv_devices:
  - /dev/nvme1n1
  - /dev/nvme2n1
  - /dev/nvme4n1
  - /dev/nvme7n1
nvmeof_target_lvm_patch_first_namespace: true

nvmeof_setup_subsystems:
  - name: "nqn.2026-04.com.amd.rocm-aic:gpu-shared-01"
    allow_any_host: true
    namespaces:
      - nsid: 1
        # Placeholder only until LVM patches to /dev/nvmeof_vg/nvmeof_lv (must
        # not be root disk — disk_guard checks this path too).
        device_path: /dev/nvme1n1
        enable: true

nvmeof_setup_ports:
  - port_id: 1
    trtype: rdma
    adrfam: ipv4
    traddr: "{{ nvmeof_setup_target_ip }}"
    trsvcid: "{{ nvmeof_setup_port }}"
    subsystems:
      - "nqn.2026-04.com.amd.rocm-aic:gpu-shared-01"
