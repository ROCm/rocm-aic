---
# RDMA role: default is ICMP full_ping (inventory inherits role default).
# Override with pair_pingpong or full_perftest when you want perftest.
# rdma_network_matrix_mode: full_perftest
#
# udev netdev/RDMA rename is off in host_setup role defaults (see
# roles/host_setup/defaults/main.yml). To enable: host_setup_udev_rename: true
# and usually host_setup_udev_rename_live_apply: false until a reboot applies
# rules safely. After rename, fabric NICs may be mlx-eth0, bnxt-eth0, etc.;
# set rdma_network_bind_interface to match your fabric device if needed.

# Match the SSH login (ansible_user) to user_setup and rocm_setup.
username: "{{ ansible_user }}"
rocm_setup_user: "{{ username }}"

# Do not let collection roles trigger unattended reboots during Ansible runs.
rdma_setup_reboot: false
rocm_setup_skip_reboot: true

# rocminfo/HIP checks
rocm_setup_run_checks: true

rocm_setup_install_metrics_exporter: true

# Prometheus node exporter (package + service; see host_setup).
# RDMA and NVMe Prometheus exporters via batesste collection roles.
rdma_setup_install_rdma_exporter: true
nvme_exporter_setup_install: true

# Extra packages installed by site.yml (host_setup role) on top of the
# sbates130272.batesste.fave_packages base set.  Edit this
# list to add or remove project-specific packages.
extra_packages:
  # GPU monitoring and tools
  - nvtop
  - numactl
  - pciutils
  # NVMe and storage
  - nvme-cli
  - gdisk
  # RDMA and networking
  - ibverbs-utils
  - rdma-core
  - rdmacm-utils
  - infiniband-diags
  - perftest
  - iperf3
  - ethtool
  - lldpd
  - net-tools
  # Debugging and profiling
  - htop
  - lshw
  - strace
  - gdb
  - valgrind
  - dwarves
  - trace-cmd
  - hwloc
  # Infrastructure
  - ipmitool
  - socat
  - jq
  # Monitoring
  - prometheus-node-exporter

# --- Optional: ROCm inference container (playbooks/inference-image.yml) ---
# inference_nixl_git_url: git@github.com:ROCm/nixl.git
# inference_nixl_git_ref: ""
# inference_container_tarball: /tmp/rocm-inference-stack.tar
