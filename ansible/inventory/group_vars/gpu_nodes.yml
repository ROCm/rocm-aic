---
# Match the SSH login (ansible_user) to user_setup and rocm_setup.
username: "{{ ansible_user }}"
rocm_setup_user: "{{ username }}"

# Do not let collection roles trigger unattended reboots during Ansible runs.
rdma_setup_reboot: false
rocm_setup_skip_reboot: true

# rocminfo/HIP checks
rocm_setup_run_checks: true

rocm_setup_install_metrics_exporter: true

# Extra packages installed by site.yml (host_setup role) on top of the
# sbates130272.batesste.fave_packages base set.  Edit this
# list to add or remove project-specific packages.
extra_packages:
  # GPU monitoring and tools
  - nvtop
  - numactl
  - pciutils
  # NVMe and storage
  - nvme-cli
  - gdisk
  # RDMA and networking
  - ibverbs-utils
  - rdma-core
  - rdmacm-utils
  - infiniband-diags
  - perftest
  - iperf3
  - ethtool
  - lldpd
  - net-tools
  # Debugging and profiling
  - htop
  - lshw
  - strace
  - gdb
  - valgrind
  - dwarves
  - trace-cmd
  - hwloc
  # Infrastructure
  - ipmitool
  - socat
  - jq
