---
# NVMe-oF target configuration (optional).
# Only needed when using local NVMe storage for the LMCache L2a pool.
# Leave this file empty / do not add hosts to nvmeof_target if not used.

# The NQN must be globally unique.
# Convention: nqn.YYYY-MM.<reverse-domain>:<descriptive-name>
nvmeof_setup_nqn: "nqn.2024-01.com.example.aai-day:shared-storage-01"   # REPLACE

# Network interface that carries RDMA fabric traffic on this host.
nvmeof_setup_target_interface: ""   # REPLACE e.g. "ens4f0np0"

# Block devices to present as NVMe-oF namespaces.
# List the raw device paths (no partitions, no mount).
nvmeof_target_devices: []   # REPLACE e.g. ["/dev/nvme0n1", "/dev/nvme1n1"]
