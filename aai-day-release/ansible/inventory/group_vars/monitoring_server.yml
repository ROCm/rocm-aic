---
# Monitoring server configuration (Prometheus + Grafana).

# Grafana version to install from apt.grafana.com.
monitoring_grafana_apt_version: "13.0.1"

# Set a non-empty password to protect the Grafana admin account.
# Best practice: supply via ansible-vault or the GRAFANA_ADMIN_PASSWORD env var.
monitoring_grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('', true) }}"
monitoring_grafana_require_admin_password: false

# Outbound remote_write to Grafana Cloud or another Prometheus-compatible receiver.
# Leave empty to store metrics locally only.
monitoring_prometheus_remote_write_url: ""

# Enable opt-in vLLM and LMCache scrape jobs. Values inherited from gpu_nodes.yml.
monitoring_scrape_vllm_enabled: true
monitoring_scrape_lmcache_enabled: true
