---
# aai-day-release inventory skeleton.
# Replace all 192.0.2.x addresses and hostnames with your actual values.
# These addresses are from RFC 5737 TEST-NET-3 and are intentionally
# non-routable placeholders.

all:
  children:

    gpu_nodes:
      vars:
        # Set ANSIBLE_REMOTE_USER or uncomment and set ansible_user directly.
        ansible_user: "{{ lookup('env', 'ANSIBLE_REMOTE_USER') | default('ubuntu', true) }}"
      hosts:
        gpu-node-01:
          ansible_host: 192.0.2.10    # REPLACE with actual IP or hostname
        gpu-node-02:
          ansible_host: 192.0.2.11    # REPLACE with actual IP or hostname
        # Add more nodes here following the same pattern.

    monitoring_server:
      hosts:
        gpu-node-01: {}               # The host that runs Prometheus + Grafana.

    nfs_rdma_server:
      hosts:
        gpu-node-01: {}               # The host that exports NFS over RDMA.

    nfs_rdma_clients:
      hosts:
        gpu-node-02: {}               # Hosts that mount the NFS/RDMA export.

    nvmeof_target:
      hosts: {}                       # Optional: host with NVMe-oF target (leave empty if not used).

    nvmeof_hosts:
      hosts: {}                       # Optional: hosts that connect as NVMe-oF initiators.
