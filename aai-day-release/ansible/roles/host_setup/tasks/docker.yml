---
- name: Install Docker engine packages (Ubuntu/Debian)
  ansible.builtin.apt:
    name: "{{ host_setup_docker_packages }}"
    state: present
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Add ansible user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
