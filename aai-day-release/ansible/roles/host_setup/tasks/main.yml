---
- name: Install extra packages
  ansible.builtin.package:
    name: "{{ extra_packages }}"
    state: present
    update_cache: true
  when: extra_packages | length > 0
  tags: [extra_packages, packages]

- name: Install and configure Docker
  ansible.builtin.include_tasks: docker.yml
  tags: [docker, provision]

- name: Configure node_exporter textfile collector and enable service
  ansible.builtin.include_tasks: node_exporter.yml
  when: host_setup_enable_prometheus_node_exporter | default(true) | bool
  tags: [node_exporter, provision]

- name: Verify ROCm / GPU is accessible
  ansible.builtin.include_tasks: rocm_check.yml
  tags: [rocm_check, provision]
