---
- name: Validate required target variables
  ansible.builtin.assert:
    that:
      - nvmeof_setup_nqn | length > 0
      - nvmeof_setup_target_interface | length > 0
      - nvmeof_target_devices | length > 0
    fail_msg: >-
      Set nvmeof_setup_nqn, nvmeof_setup_target_interface, and
      nvmeof_target_devices in group_vars/nvmeof_target.yml.

- name: Load NVMe-oF target kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    persistent: present
  loop: "{{ nvmeof_target_modules }}"

- name: Mount configfs (required for nvmet)
  ansible.posix.mount:
    path: /sys/kernel/config
    src: configfs
    fstype: configfs
    state: mounted

- name: Create NVMe-oF subsystem in configfs
  ansible.builtin.file:
    path: "/sys/kernel/config/nvmet/subsystems/{{ nvmeof_setup_nqn }}"
    state: directory
    mode: "0755"

- name: Allow any host to connect (open mode)
  ansible.builtin.copy:
    content: "1\n"
    dest: "/sys/kernel/config/nvmet/subsystems/{{ nvmeof_setup_nqn }}/attr_allow_any_host"
    mode: "0644"

- name: Configure namespace for each device
  ansible.builtin.include_tasks: target_namespace.yml
  loop: "{{ nvmeof_target_devices }}"
  loop_control:
    index_var: _nvmeof_ns_idx
    loop_var: _nvmeof_device

- name: Create NVMe-oF RDMA port in configfs
  ansible.builtin.file:
    path: /sys/kernel/config/nvmet/ports/1
    state: directory
    mode: "0755"

- name: Set NVMe-oF port to RDMA transport
  ansible.builtin.copy:
    content: "rdma\n"
    dest: /sys/kernel/config/nvmet/ports/1/addr_trtype
    mode: "0644"

- name: Set NVMe-oF port IP address
  ansible.builtin.shell:
    cmd: >-
      ip -4 addr show dev {{ nvmeof_setup_target_interface | quote }}
      | awk '/inet / { split($2, a, "/"); print a[1]; exit }'
    executable: /bin/bash
  register: _nvmeof_target_ip
  changed_when: false

- name: Apply target IP to NVMe-oF port
  ansible.builtin.copy:
    content: "{{ _nvmeof_target_ip.stdout | trim }}\n"
    dest: /sys/kernel/config/nvmet/ports/1/addr_traddr
    mode: "0644"

- name: Set NVMe-oF port to 4420
  ansible.builtin.copy:
    content: "4420\n"
    dest: /sys/kernel/config/nvmet/ports/1/addr_trsvcid
    mode: "0644"

- name: Set address family to IPv4
  ansible.builtin.copy:
    content: "ipv4\n"
    dest: /sys/kernel/config/nvmet/ports/1/addr_adrfam
    mode: "0644"

- name: Link subsystem into port
  ansible.builtin.file:
    path: "/sys/kernel/config/nvmet/ports/1/subsystems/{{ nvmeof_setup_nqn }}"
    src: "/sys/kernel/config/nvmet/subsystems/{{ nvmeof_setup_nqn }}"
    state: link
