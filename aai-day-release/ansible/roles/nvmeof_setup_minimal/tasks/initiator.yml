---
- name: Validate required initiator variables
  ansible.builtin.assert:
    that:
      - nvmeof_setup_nqn | length > 0
      - nvmeof_setup_target_ip | length > 0
    fail_msg: >-
      Set nvmeof_setup_nqn and nvmeof_setup_target_ip in
      group_vars/nvmeof_hosts.yml.

- name: Load NVMe-oF initiator kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    persistent: present
  loop: "{{ nvmeof_initiator_modules }}"

- name: Connect to NVMe-oF target via RDMA
  ansible.builtin.command:
    argv:
      - nvme
      - connect
      - -t
      - rdma
      - -a
      - "{{ nvmeof_setup_target_ip }}"
      - -s
      - "4420"
      - -n
      - "{{ nvmeof_setup_nqn }}"
  register: _nvmeof_connect
  changed_when: _nvmeof_connect.rc == 0
  failed_when:
    - _nvmeof_connect.rc != 0
    - "'already connected' not in _nvmeof_connect.stderr"
