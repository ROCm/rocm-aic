---
- name: Deploy aai-day systemd unit
  ansible.builtin.template:
    src: aai-day-stack.service.j2
    dest: "/etc/systemd/system/{{ aai_day_service_name }}.service"
    mode: "0644"
  notify: Reload systemd

- name: Enable and start aai-day stack service
  ansible.builtin.systemd:
    name: "{{ aai_day_service_name }}"
    enabled: true
    state: started
    daemon_reload: true
