---
- name: Require explicit NFS/RDMA server and client IPs
  ansible.builtin.assert:
    that:
      - nfs_rdma_server_ip | length > 0
      - nfs_rdma_export_clients | length > 0
    fail_msg: >-
      Set nfs_rdma_server_ip and nfs_rdma_export_clients to numeric RDMA
      fabric IP addresses in group_vars/nfs_rdma_server.yml.

- name: Confirm server IP is assigned to this host
  ansible.builtin.command:
    argv: [ip, -4, addr, show]
  register: _nfs_rdma_ip_addr
  changed_when: false
  failed_when: nfs_rdma_server_ip not in _nfs_rdma_ip_addr.stdout

- name: Install NFS/RDMA server packages
  ansible.builtin.apt:
    name: "{{ nfs_rdma_server_packages }}"
    state: present
    update_cache: true

- name: Load NFS/RDMA server kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    persistent: "{{ 'present' if nfs_rdma_persist_modules | bool else 'disabled' }}"
  loop: "{{ nfs_rdma_server_modules }}"

# ---------------------------------------------------------------------------
# Block device mode: mount the device before exporting.
# ---------------------------------------------------------------------------
- name: Stat export device
  ansible.builtin.stat:
    path: "{{ nfs_rdma_export_device }}"
  register: _nfs_rdma_dev_stat
  when: not nfs_rdma_plain_dir_mode | bool

- name: Fail when export device is missing
  ansible.builtin.assert:
    that:
      - _nfs_rdma_dev_stat.stat.exists
      - _nfs_rdma_dev_stat.stat.isblk | default(false)
        or _nfs_rdma_dev_stat.stat.islnk | default(false)
    fail_msg: >-
      Expected block device {{ nfs_rdma_export_device }} is missing.
      Either pre-create the device or set nfs_rdma_plain_dir_mode: true to
      export a plain directory instead.
  when: not nfs_rdma_plain_dir_mode | bool

- name: Detect current filesystem on export device
  ansible.builtin.command:
    argv: [blkid, -o, value, -s, TYPE, "{{ nfs_rdma_export_device }}"]
  register: _nfs_rdma_existing_fstype
  changed_when: false
  failed_when: false
  when: not nfs_rdma_plain_dir_mode | bool

- name: Require explicit opt-in before formatting a blank device
  ansible.builtin.assert:
    that:
      - nfs_rdma_recreate_filesystem | bool
        or _nfs_rdma_existing_fstype.stdout | length > 0
    fail_msg: >-
      {{ nfs_rdma_export_device }} has no detected filesystem. Rerun with
      -e nfs_rdma_recreate_filesystem=true to format it.
  when: not nfs_rdma_plain_dir_mode | bool

- name: Create filesystem on device when opted in
  community.general.filesystem:
    fstype: "{{ nfs_rdma_filesystem_type }}"
    dev: "{{ nfs_rdma_export_device }}"
    force: true
  when:
    - not nfs_rdma_plain_dir_mode | bool
    - nfs_rdma_recreate_filesystem | bool

- name: Ensure export mount point exists
  ansible.builtin.file:
    path: "{{ nfs_rdma_export_mount }}"
    state: directory
    mode: "0755"

- name: Mount export device
  ansible.posix.mount:
    path: "{{ nfs_rdma_export_mount }}"
    src: "{{ nfs_rdma_export_device }}"
    fstype: "{{ nfs_rdma_filesystem_type }}"
    opts: "{{ nfs_rdma_export_mount_options }}"
    state: mounted
  when: not nfs_rdma_plain_dir_mode | bool

# ---------------------------------------------------------------------------
# Shared: export the directory (plain dir or mounted device).
# ---------------------------------------------------------------------------
- name: Ensure NFS exports.d directory exists
  ansible.builtin.file:
    path: "{{ nfs_rdma_exports_file | dirname }}"
    state: directory
    mode: "0755"

- name: Publish managed NFS export
  ansible.builtin.template:
    src: exports.j2
    dest: "{{ nfs_rdma_exports_file }}"
    mode: "0644"
  notify: Reload NFS exports

- name: Enable NFSv4 in nfs.conf
  community.general.ini_file:
    path: /etc/nfs.conf
    section: nfsd
    option: vers4
    value: "y"
    mode: "0644"
  notify: Restart NFS server

- name: Enable and start NFS server
  ansible.builtin.service:
    name: nfs-server
    enabled: true
    state: started

- name: Install persistent NFS/RDMA port service
  ansible.builtin.template:
    src: nfs-rdma-port.service.j2
    dest: "/etc/systemd/system/{{ nfs_rdma_port_service_name }}.service"
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers before enabling NFS/RDMA listener
  ansible.builtin.meta: flush_handlers

- name: Enable and start NFS/RDMA listener service
  ansible.builtin.systemd:
    name: "{{ nfs_rdma_port_service_name }}"
    enabled: true
    state: started

- name: Confirm NFS/RDMA listener is registered
  ansible.builtin.command:
    argv:
      - awk
      - "$1 == \"rdma\" && $2 == \"{{ nfs_rdma_port }}\" { found = 1 }
        END { exit !found }"
      - /proc/fs/nfsd/portlist
  changed_when: false
