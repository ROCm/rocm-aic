---
# Set true to export a plain directory (no block device, no LVM required).
# Set false to mount and export a block device or logical volume.
nfs_rdma_plain_dir_mode: true

# --- Block device mode (nfs_rdma_plain_dir_mode: false) ---
# Full path to the block device or LV to format/mount.
# Example: /dev/sdb1 or /dev/vg0/lv_cache
nfs_rdma_export_device: ""
nfs_rdma_filesystem_type: xfs
nfs_rdma_recreate_filesystem: false
nfs_rdma_export_mount_options: noatime

# --- Both modes ---
# Directory to create and export.
nfs_rdma_export_mount: /srv/aai-day-cache
nfs_rdma_export_path: "{{ nfs_rdma_export_mount }}"

# Numeric RDMA fabric IP of this server host.
nfs_rdma_server_ip: ""

# Numeric RDMA fabric IPs of client hosts that may mount this export.
nfs_rdma_export_clients: []

nfs_rdma_export_options: rw,sync,no_subtree_check,no_root_squash
nfs_rdma_port: 20049

nfs_rdma_server_packages:
  - nfs-kernel-server
  - nfs-common
  - rdma-core
  - ibverbs-utils
  - infiniband-diags

nfs_rdma_server_modules:
  - svcrdma
nfs_rdma_persist_modules: true

nfs_rdma_exports_file: /etc/exports.d/aai-day-nfs-rdma.exports
nfs_rdma_port_service_name: aai-day-nfs-rdma-port
