---
- name: Deploy Prometheus and Grafana monitoring stack
  hosts: monitoring_server
  become: true
  gather_facts: true
  roles:
    - monitoring_stack

- name: Enable prometheus-node-exporter on GPU nodes
  hosts: gpu_nodes
  become: true
  gather_facts: false
  tasks:
    - name: Enable and start prometheus-node-exporter
      ansible.builtin.service:
        name: prometheus-node-exporter
        state: started
        enabled: true
      when: "'prometheus-node-exporter' in (extra_packages | default([]))"
