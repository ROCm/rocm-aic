---
# Build the aai-day Docker image on the Ansible controller, save it to a
# tarball, copy the tarball to GPU nodes, and load it with `docker load`.
#
# To pull a pre-built image from a registry instead, set:
#   aai_day_pull_image: true
#   aai_day_image_registry: ghcr.io/your-org
#   aai_day_image_tag: latest
#
# To build from source (default), leave aai_day_pull_image: false (default).
# The build runs on localhost using Docker BuildKit and the aai-day-release
# Dockerfile; the image is then distributed to gpu_nodes via docker save/load.

- name: Build aai-day image on controller (BuildKit)
  hosts: localhost
  connection: local
  gather_facts: false
  when: not (aai_day_pull_image | default(false) | bool)
  tasks:
    - name: Resolve repo root (two levels above playbooks/)
      ansible.builtin.set_fact:
        aai_day_repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"

    - name: Check aai-day-release Dockerfile exists
      ansible.builtin.stat:
        path: "{{ aai_day_repo_root }}/aai-day-release/Dockerfile"
      register: _aai_day_df

    - name: Fail when Dockerfile is missing
      ansible.builtin.fail:
        msg: >-
          Dockerfile not found at {{ aai_day_repo_root }}/aai-day-release/Dockerfile.
          Run this playbook from the cloned rocm-aic repository root, or set
          aai_day_repo_root explicitly.
      when: not _aai_day_df.stat.exists

    - name: Build aai-day Docker image
      ansible.builtin.command:
        argv:
          - docker
          - buildx
          - build
          - --load
          - -f
          - "{{ aai_day_repo_root }}/aai-day-release/Dockerfile"
          - --build-arg
          - "ROCM_ARCH={{ rocm_arch | default('gfx942') }}"
          - -t
          - "{{ aai_day_image_name | default('rocm-aic-aai-day') }}:{{ aai_day_image_tag | default('latest') }}"
          - "{{ aai_day_repo_root }}"
      environment:
        DOCKER_BUILDKIT: "1"
      changed_when: true

    - name: Save image to tarball on controller
      ansible.builtin.command:
        argv:
          - docker
          - save
          - "-o"
          - "/tmp/aai-day-image.tar"
          - "{{ aai_day_image_name | default('rocm-aic-aai-day') }}:{{ aai_day_image_tag | default('latest') }}"
      changed_when: true

- name: Deploy image to GPU nodes (load from tarball)
  hosts: gpu_nodes
  become: true
  gather_facts: true
  when: not (aai_day_pull_image | default(false) | bool)
  tasks:
    - name: Install Docker engine
      ansible.builtin.include_role:
        name: host_setup
        tasks_from: docker.yml
      tags: [docker]
    - name: Stage image tarball on node
      ansible.builtin.copy:
        src: /tmp/aai-day-image.tar
        dest: /tmp/aai-day-image.tar
        mode: "0644"

    - name: Load image from tarball
      ansible.builtin.command:
        argv:
          - docker
          - load
          - "-i"
          - /tmp/aai-day-image.tar
      register: _docker_load
      changed_when: "'Loaded image' in _docker_load.stdout"

- name: Pull aai-day image from registry
  hosts: gpu_nodes
  become: true
  gather_facts: true
  when: aai_day_pull_image | default(false) | bool
  tasks:
    - name: Install Docker engine
      ansible.builtin.include_role:
        name: host_setup
        tasks_from: docker.yml
      tags: [docker]
    - name: Pull image from registry
      community.docker.docker_image:
        name: "{{ aai_day_image_registry | default('ghcr.io/rocm') }}/{{ aai_day_image_name | default('rocm-aic-aai-day') }}"
        tag: "{{ aai_day_image_tag | default('latest') }}"
        source: pull
