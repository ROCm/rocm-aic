---
# Configure NFS-over-RDMA storage.
# Run explicitly with: ansible-playbook site.yml --tags nfs-rdma
#
# This sets up one server (nfs_rdma_server group) and one or more clients
# (nfs_rdma_clients group) for NFS exports over RDMA (RoCE or InfiniBand).
#
# The NFS-over-RDMA mount is used as the LMCache L2b POSIX pool (NFS_DATA).
# When nfs_rdma_plain_dir_mode is true (default), no block device or LVM is
# required — the server simply exports a directory.

- name: Configure NFS/RDMA server
  hosts: nfs_rdma_server
  become: true
  gather_facts: true
  roles:
    - nfs_rdma_server

- name: Mount NFS/RDMA export on clients
  hosts: nfs_rdma_clients
  become: true
  gather_facts: true
  roles:
    - nfs_rdma_client
