---
# Flavor: TP=8, GDS NVMe slab L1 (hipFile mode).
# GPU requirement: 8x AMD GPUs on ONE node (MI300X or similar).
# Storage requirement: local NVMe PVC for the GDS slab file (see pvc-gds.yaml).
#
# LMCache tiers:
#   L1: NVMe slab via hipFile GDS (no DRAM L1 — GDS replaces it)
#   L2: none
#
# NOTE: GDS mode requires hipFile kernel module support and specific
# ROCm version compatibility. See the aai-day-release Dockerfile for details.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - pvc-gds.yaml

patches:
  - target:
      kind: Deployment
      name: aai-day-vllm
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/6/value
        value: "0,1,2,3,4,5,6,7"
      - op: replace
        path: /spec/template/spec/containers/0/args/2
        value: "--tensor-parallel-size=8"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/amd.com~1gpu
        value: 8
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 800Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1600Gi
      # Enable GDS L1 mode on lmcache-server.
      - op: replace
        path: /spec/template/spec/initContainers/0/env/2/value
        value: "1"
      - op: replace
        path: /spec/template/spec/initContainers/0/args/0
        value: |
          exec lmcache server \
            --host 0.0.0.0 \
            --port "${LMCACHE_PORT}" \
            --l1-size-gb "${LMCACHE_L1_SIZE_GB}" \
            --eviction-policy LRU \
            --gds-l1-path /data/slab
      - op: add
        path: /spec/template/spec/initContainers/0/volumeMounts/-
        value:
          name: gds-slab
          mountPath: /data/slab
      - op: add
        path: /spec/template/spec/initContainers/0/volumeMounts/-
        value:
          name: sys-kernel-debug
          mountPath: /sys/kernel/debug
      - op: add
        path: /spec/template/spec/initContainers/0/volumeMounts/-
        value:
          name: sys-kernel-btf
          mountPath: /sys/kernel/btf
          readOnly: true
      - op: add
        path: /spec/template/spec/initContainers/0/volumeMounts/-
        value:
          name: boot
          mountPath: /boot
          readOnly: true
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: gds-slab
          persistentVolumeClaim:
            claimName: aai-day-gds-slab
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: sys-kernel-debug
          hostPath:
            path: /sys/kernel/debug
            type: Directory
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: sys-kernel-btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: boot
          hostPath:
            path: /boot
            type: Directory
