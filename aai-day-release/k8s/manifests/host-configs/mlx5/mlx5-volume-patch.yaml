---
# Inject host libmlx5 RDMA library into the lmcache-server sidecar.
# The host path matches the default Ubuntu/Debian install location.
# Adjust if your distribution or OFED stack places it elsewhere.
# For NVIDIA OFED installs, the path is often under /usr/lib/libibverbs/.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aai-day-vllm
spec:
  template:
    spec:
      initContainers:
        - name: lmcache-server
          volumeMounts:
            - name: mlx5
              mountPath: /usr/lib/x86_64-linux-gnu/libibverbs/libmlx5-rdmav34.so
              readOnly: true
      volumes:
        - name: mlx5
          hostPath:
            path: /usr/lib/x86_64-linux-gnu/libibverbs/libmlx5-rdmav34.so
            type: File
