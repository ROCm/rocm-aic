---
# Kustomize Component: Broadcom RoCE (bnxt_re) RDMA library injection.
# Apply this component when your cluster uses Broadcom BCM57xxx / BCM58xxx
# network adapters for RDMA (RoCE v2).
#
# Usage: add to a flavor's kustomization.yaml:
#   components:
#     - ../../host-configs/bnxt-re
#
# The patch mounts the host libbnxt_re driver into the lmcache-server sidecar
# so that NIXL can use the NIC's RDMA capabilities for AIS_MT and POSIX pools.
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - path: bnxt-volume-patch.yaml
    target:
      kind: Deployment
      name: aai-day-vllm
