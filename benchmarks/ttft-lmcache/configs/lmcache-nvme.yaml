#
# LMCache config -- NVMe direct (O_DIRECT, non-AIS)
#
# KV cache chunks are stored as .pt files on an NVMe device
# mounted at /cache inside the container.  O_DIRECT bypasses
# the page cache for more predictable latency.

chunk_size: 256
save_decode_cache: true
enable_blending: true
blend_recompute_ratios: 0.15

local_cpu: false
local_disk: "file:///cache/lmcache/"
max_local_disk_size: 50.0

extra_config:
  use_odirect: true

remote_url: null
