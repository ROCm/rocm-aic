#
# LMCache config -- remote filesystem (NFS / CIFS / shared mount)
#
# KV cache chunks are stored as .pt files under /cache/lmcache/.
# Mount the remote filesystem at /cache inside the container.
# O_DIRECT is disabled because most network filesystems do not
# support it reliably.

chunk_size: 256
save_decode_cache: true
enable_blending: true
blend_recompute_ratios: 0.15

local_cpu: false
local_disk: "file:///cache/lmcache/"
max_local_disk_size: 50.0

remote_url: null
