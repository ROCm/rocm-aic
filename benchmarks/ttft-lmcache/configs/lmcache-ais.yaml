#
# LMCache config -- NVMe via hipFile / AIS (GPU Direct Storage)
#
# KV cache chunks are stored on NVMe at /data/lmcache using
# hipFile for GPU-direct transfers.  Requires /dev/infiniband
# and /data mount in the container.

chunk_size: 256
save_decode_cache: true
enable_blending: true
blend_recompute_ratios: 0.15

local_cpu: false
gds_path: "/data/lmcache"
cufile_buffer_size: 8192

extra_config:
  use_hipfile: true
  use_cufile: false
  use_direct_io: true

remote_url: null
